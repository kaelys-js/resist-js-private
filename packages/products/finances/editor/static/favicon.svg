<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    Master Logo
    =====================
    Canonical source for ALL brand assets.
    NEVER edit files in static/ directly — regenerate with: pnpm generate-icons

    Design: Dollar sign in circle with gradient green styling.
    Based on Lucide circle-dollar-sign (MIT license).
    Adapts to light/dark via prefers-color-scheme.
  -->
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="bg-grad-light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#064e3b" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg-grad)" filter="url(#shadow)"/>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#6ee7b7" stroke-width="6" opacity="0.3"/>

  <!-- Dollar S-curve: top half curves right, bottom half curves left -->
  <path
    d="M320 184 H240 a48 48 0 0 0 0 96 h32 a48 48 0 0 1 0 96 H192"
    fill="none"
    stroke="#ecfdf5"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Dollar vertical bar -->
  <line x1="256" y1="136" x2="256" y2="376" stroke="#ecfdf5" stroke-width="28" stroke-linecap="round"/>

  <style>
    @media (prefers-color-scheme: light) {
      circle:first-of-type { fill: url(#bg-grad-light); }
    }
  </style>
</svg>
