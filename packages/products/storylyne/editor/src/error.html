<!doctype html>
<!--
  Static error fallback — served when SvelteKit's rendering pipeline fails.

  This file uses {{placeholders}} resolved at build time by vite-plugin-template-html.
  Text comes from en.ts (English locale) and app-meta.ts (app identity/fonts).
  Dynamic per-user locale is NOT possible here — this is a last-resort page.
  The full localized error UI lives in +error.svelte / ErrorPage.svelte.
-->
<html lang="en" dir="ltr">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="color-scheme" content="light dark" />
		<meta name="robots" content="noindex, nofollow" />
		<meta name="format-detection" content="telephone=no" />
		<link rel="icon" href="/favicon.ico" sizes="32x32" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<title>{{errors.serverError}} | {{APP_NAME}}</title>
		<style>
			{{FONT_FACE_CSS}}
			:root {
				--background: oklch(1 0 0);
				--foreground: oklch(0.145 0 0);
				--muted: oklch(0.965 0 0);
				--muted-foreground: oklch(0.556 0 0);
				--border: oklch(0.922 0 0);
				--primary: oklch(0.205 0 0);
				--primary-foreground: oklch(0.985 0 0);
			}
			@media (prefers-color-scheme: dark) {
				:root {
					--background: oklch(0.145 0 0);
					--foreground: oklch(0.985 0 0);
					--muted: oklch(0.269 0 0);
					--muted-foreground: oklch(0.708 0 0);
					--border: oklch(0.269 0 0);
					--primary: oklch(0.985 0 0);
					--primary-foreground: oklch(0.205 0 0);
				}
			}
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				-webkit-tap-highlight-color: transparent;
			}
			html {
				overscroll-behavior: none;
				-webkit-font-smoothing: antialiased;
				-moz-osx-font-smoothing: grayscale;
			}
			body {
				font-family: {{FONT_FAMILIES}};
				display: flex;
				justify-content: center;
				align-items: center;
				min-height: 100vh;
				margin: 0;
				background: var(--background);
				color: var(--foreground);
				touch-action: manipulation;
			}
			.container {
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				min-height: 60vh;
				gap: 0.5rem;
				padding: 1rem;
				text-align: center;
			}
			.icon {
				margin-bottom: 0.5rem;
				color: #ef4444;
			}
			.icon svg {
				width: 48px;
				height: 48px;
				stroke-width: 1.5;
			}
			h1 {
				font-size: 1.5rem;
				font-weight: 600;
				letter-spacing: -0.025em;
				margin: 0;
			}
			.description {
				margin-top: 0.25rem;
				font-size: 0.875rem;
				color: var(--muted-foreground);
				line-height: 1.625;
				max-width: 28rem;
			}
			.home-link {
				display: inline-flex;
				align-items: center;
				justify-content: center;
				gap: 0.5rem;
				height: 2.25rem;
				margin-top: 2rem;
				padding: 0 1rem;
				font-size: 0.875rem;
				font-weight: 500;
				line-height: 1;
				text-decoration: none;
				border-radius: 0.375rem;
				background: var(--primary);
				color: var(--primary-foreground);
				box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
				transition:
					background 0.15s,
					opacity 0.15s;
			}
			.home-link:hover {
				opacity: 0.9;
			}
			.home-link svg {
				width: 16px;
				height: 16px;
				flex-shrink: 0;
			}
			@keyframes fadeIn {
				from {
					opacity: 0;
				}
				to {
					opacity: 1;
				}
			}
			.error-id-btn {
				display: none;
				align-items: center;
				justify-content: center;
				gap: 0.375rem;
				height: 1.75rem;
				min-width: 1.5rem;
				margin: 2rem auto 0;
				padding: 0 0.625rem;
				font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace;
				font-size: 0.75rem;
				color: var(--muted-foreground);
				background: transparent;
				border: 1px solid transparent;
				border-radius: 0.375rem;
				cursor: pointer;
				transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1);
				user-select: text;
				overflow-wrap: break-word;
				max-width: 100%;
			}
			.error-id-btn:hover {
				color: var(--foreground);
				background-color: var(--muted);
				border-color: var(--border);
			}
			@supports (color: color-mix(in lab, red, red)) {
				.error-id-btn:hover {
					background-color: color-mix(in oklab, var(--muted) 50%, transparent);
				}
			}
			.error-id-btn svg {
				width: 12px;
				height: 12px;
				flex-shrink: 0;
			}
			.error-id-btn .copied-text {
				color: #22c55e;
			}
			.error-id-btn .copied-icon {
				color: #22c55e;
			}
			.error-id-btn .error-text {
				color: #ef4444;
			}
			.error-id-btn .error-icon {
				color: #ef4444;
			}
			.error-id-btn .fade-in {
				animation: fadeIn 150ms ease-out;
			}
			.raw-message {
				display: none;
			}
			/* Screen-reader only — visually hidden but announced by AT */
			.sr-only {
				position: absolute;
				width: 1px;
				height: 1px;
				padding: 0;
				margin: -1px;
				overflow: hidden;
				clip: rect(0, 0, 0, 0);
				white-space: nowrap;
				border-width: 0;
			}
			/* WCAG 2.4.7 — visible focus indicator for keyboard navigation */
			.home-link:focus-visible,
			.error-id-btn:focus-visible {
				outline: 2px solid var(--foreground);
				outline-offset: 2px;
			}
			/* WCAG 2.3.3 — respect reduced motion preference */
			@media (prefers-reduced-motion: reduce) {
				*,
				*::before,
				*::after {
					animation-duration: 0.01ms !important;
					animation-iteration-count: 1 !important;
					transition-duration: 0.01ms !important;
				}
			}
			/* Windows High Contrast / forced-colors support */
			@media (forced-colors: active) {
				.home-link {
					border: 1px solid ButtonText;
				}
				.error-id-btn:hover {
					border-color: ButtonText;
				}
				.icon svg {
					color: LinkText;
				}
			}
		</style>
	</head>
	<body>
		<main class="container">
			<div role="alert" aria-atomic="true">
				<div class="icon" aria-hidden="true">
					<!-- Inline SVG: lucide server-crash icon -->
					<svg
						xmlns="http://www.w3.org/2000/svg"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-linecap="round"
						stroke-linejoin="round"
						aria-hidden="true"
						focusable="false"
					>
						<path
							d="M6 10H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-2"
						/>
						<path
							d="M6 14H4a2 2 0 0 0-2 2v4a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-4a2 2 0 0 0-2-2h-2"
						/>
						<path d="M6 6h.01" />
						<path d="M6 18h.01" />
						<path d="m13 6-4 6h6l-4 6" />
					</svg>
				</div>
				<h1>{{errors.serverError}}</h1>
				<p class="description">{{errors.serverErrorDescription}}</p>
			</div>
			<span class="raw-message" id="raw-message">%sveltekit.error.message%</span>
			<a class="home-link" href="/">
				<svg
					xmlns="http://www.w3.org/2000/svg"
					viewBox="0 0 24 24"
					fill="none"
					stroke="currentColor"
					stroke-width="2"
					stroke-linecap="round"
					stroke-linejoin="round"
					aria-hidden="true"
					focusable="false"
				>
					<path d="m12 19-7-7 7-7" />
					<path d="M19 12H5" />
				</svg>
				{{errors.goHome}}
			</a>
			<button
				type="button"
				class="error-id-btn"
				id="error-id-btn"
				aria-label="{{errors.copyErrorId}}"
				>
				<!-- Copy icon (lucide copy) -->
				<svg
					id="copy-icon"
					xmlns="http://www.w3.org/2000/svg"
					viewBox="0 0 24 24"
					fill="none"
					stroke="currentColor"
					stroke-width="2"
					stroke-linecap="round"
					stroke-linejoin="round"
					aria-hidden="true"
					focusable="false"
				>
					<rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
					<path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
				</svg>
				<!-- Check icon (lucide check) — shown after copy -->
				<svg
					id="check-icon"
					class="copied-icon"
					xmlns="http://www.w3.org/2000/svg"
					viewBox="0 0 24 24"
					fill="none"
					stroke="currentColor"
					stroke-width="2"
					stroke-linecap="round"
					stroke-linejoin="round"
					style="display: none"
					aria-hidden="true"
					focusable="false"
				>
					<path d="M20 6 9 17l-5-5" />
				</svg>
				<!-- Error icon (lucide x) — shown on clipboard failure -->
				<svg
					id="error-icon"
					class="error-icon"
					xmlns="http://www.w3.org/2000/svg"
					viewBox="0 0 24 24"
					fill="none"
					stroke="currentColor"
					stroke-width="2"
					stroke-linecap="round"
					stroke-linejoin="round"
					style="display: none"
					aria-hidden="true"
					focusable="false"
				>
					<path d="M18 6 6 18" />
					<path d="m6 6 12 12" />
				</svg>
				<span id="error-id-text"></span>
			</button>
			<!-- Live region for clipboard feedback — must exist before interaction -->
			<div id="copy-status" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></div>
		</main>
		<script>
			(function () { try {
				var ERROR_ID_PREFIX = '{{errors.errorIdPrefix}}';
				var COPIED_TEXT = '{{errors.copied}}';
				var FAILED_TEXT = '{{errors.copyFailed}}';

				var raw = document.getElementById('raw-message');
				if (!raw) return;
				var text = raw.textContent || '';
				var match = text.match(/\(Reference:\s*([^)]+)\)/);
				if (!match) return;
				var errorId = match[1].trim();
				var btn = document.getElementById('error-id-btn');
				var label = document.getElementById('error-id-text');
				if (!btn || !label) return;
				label.textContent = ERROR_ID_PREFIX + errorId;
				btn.style.display = 'flex';
				btn.setAttribute('data-error-id', errorId);

				var _copyTimeout;
				function applyFadeIn(el) {
					el.classList.remove('fade-in');
					void el.offsetWidth;
					el.classList.add('fade-in');
				}

				// Clipboard with legacy fallback for insecure contexts / older browsers
				function copyToClipboard(str, onDone) {
					if (navigator.clipboard && navigator.clipboard.writeText) {
						navigator.clipboard.writeText(str).then(
							function () { onDone(true); },
							function (e) {
								console.error('[{{APP_NAME}}] Clipboard write failed:', e);
								onDone(false);
							}
						);
						return;
					}
					try {
						var ta = document.createElement('textarea');
						ta.value = str;
						ta.style.position = 'fixed';
						ta.style.opacity = '0';
						document.body.appendChild(ta);
						ta.select();
						var ok = document.execCommand('copy');
						document.body.removeChild(ta);
						if (!ok) console.error('[{{APP_NAME}}] execCommand copy returned false');
						onDone(ok);
					} catch (e) {
						console.error('[{{APP_NAME}}] Clipboard fallback failed:', e);
						onDone(false);
					}
				}

				var copyIcon = document.getElementById('copy-icon');
				var checkIcon = document.getElementById('check-icon');
				var errorIcon = document.getElementById('error-icon');
				var copyStatus = document.getElementById('copy-status');
				var COPY_LABEL = btn.getAttribute('aria-label') || '';

				function hideAllIcons() {
					if (copyIcon) copyIcon.style.display = 'none';
					if (checkIcon) checkIcon.style.display = 'none';
					if (errorIcon) errorIcon.style.display = 'none';
				}

				function resetState(id) {
					hideAllIcons();
					if (copyIcon) copyIcon.style.display = 'block';
					label.textContent = ERROR_ID_PREFIX + id;
					label.className = '';
					applyFadeIn(copyIcon);
					applyFadeIn(label);
					btn.setAttribute('aria-label', COPY_LABEL);
					if (copyStatus) copyStatus.textContent = '';
				}

				function showResult(id, success) {
					hideAllIcons();
					if (success) {
						if (checkIcon) { checkIcon.style.display = 'block'; applyFadeIn(checkIcon); }
						label.textContent = COPIED_TEXT;
						label.className = 'copied-text';
						if (copyStatus) copyStatus.textContent = COPIED_TEXT;
						btn.setAttribute('aria-label', COPIED_TEXT);
					} else {
						if (errorIcon) { errorIcon.style.display = 'block'; applyFadeIn(errorIcon); }
						label.textContent = FAILED_TEXT;
						label.className = 'error-text';
						if (copyStatus) copyStatus.textContent = FAILED_TEXT;
						btn.setAttribute('aria-label', FAILED_TEXT);
					}
					applyFadeIn(label);
					clearTimeout(_copyTimeout);
					_copyTimeout = setTimeout(function () { resetState(id); }, 2000);
				}

				btn.addEventListener('click', function () {
					var id = btn.getAttribute('data-error-id');
					if (!id) return;
					copyToClipboard(id, function (success) { showResult(id, success); });
				});
			} catch (e) { console.error('[{{APP_NAME}}] Error page script failed:', e); }
			})();
		</script>
	</body>
</html>
