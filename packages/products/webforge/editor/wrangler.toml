# Cloudflare Workers configuration for the WebForge editor.
#
# Used by adapter-cloudflare at build time and by wrangler for local
# dev/preview emulation. The adapter reads this to locate the build
# output and configure the Worker entrypoint.
#
# Compatibility flags:
#   - nodejs_als: required by SvelteKit for AsyncLocalStorage context.
#
# See: https://developers.cloudflare.com/workers/configuration/

name = "webforge-editor"
main = ".svelte-kit/cloudflare/_worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_als"]

[assets]
binding = "ASSETS"
directory = ".svelte-kit/cloudflare"

# ── Observability (Workers Logs) ──────────────────────────────────────
# Captures all console output (log.error, log.info, etc.) as structured
# events in Workers Logs. These can be forwarded to external destinations
# (R2, Datadog, Splunk, etc.) via Logpush:
#   https://developers.cloudflare.com/workers/observability/logpush/
#
# To set up Logpush, configure a destination in the Cloudflare dashboard:
#   Workers & Pages → your worker → Logs → Add Logpush destination
#
# Tail Workers are an alternative for real-time log processing but add
# complexity — start with Logpush unless you need custom filtering.
[observability]
enabled = true
head_sampling_rate = 1.0  # Capture all requests; tune down in high-traffic production

# ── D1 Database (uncomment when ready) ───────────────────────────────
# [[d1_databases]]
# binding = "DB"
# database_name = "webforge-db"
# database_id = "<your-database-id>"
