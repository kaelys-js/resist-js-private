<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    WebForge Master Logo
    =====================
    Canonical source for ALL brand assets.
    NEVER edit files in static/ directly — regenerate with: pnpm generate-icons

    Design: Faceted crystal with gradient lighting, inner glow, and spark accent.
    Adapts to light/dark via prefers-color-scheme.
  -->
  <defs>
    <!-- Top cap gradient (brightest — direct light) -->
    <linearGradient id="g-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>

    <!-- Upper-left facet -->
    <linearGradient id="g-ul" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>

    <!-- Upper-right facet -->
    <linearGradient id="g-ur" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>

    <!-- Mid-left facet -->
    <linearGradient id="g-ml" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>

    <!-- Mid-right facet -->
    <linearGradient id="g-mr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>

    <!-- Lower-left facet (deepest shadow) -->
    <linearGradient id="g-ll" x1="0.5" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>

    <!-- Lower-right facet -->
    <linearGradient id="g-lr" x1="0.5" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>

    <!-- Center highlight (inner glow) -->
    <radialGradient id="g-glow" cx="0.45" cy="0.35" r="0.5">
      <stop offset="0%" stop-color="#dbeafe" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#93c5fd" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>

    <!-- Spark gradient -->
    <radialGradient id="g-spark" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>

    <!-- Edge highlight line gradient -->
    <linearGradient id="g-edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#bfdbfe" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#93c5fd" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- === Crystal body === -->

  <!-- Top cap (crown) — brightest facet -->
  <polygon fill="url(#g-top)" points="256,32 340,152 172,152"/>

  <!-- Upper-left facet -->
  <polygon fill="url(#g-ul)" points="172,152 256,188 120,248"/>

  <!-- Upper-right facet -->
  <polygon fill="url(#g-ur)" points="340,152 256,188 392,248"/>

  <!-- Upper center bridge -->
  <polygon fill="url(#g-top)" points="172,152 340,152 256,188" opacity="0.85"/>

  <!-- Mid-left facet -->
  <polygon fill="url(#g-ml)" points="120,248 256,188 256,340 140,348"/>

  <!-- Mid-right facet -->
  <polygon fill="url(#g-mr)" points="392,248 256,188 256,340 372,348"/>

  <!-- Lower-left facet -->
  <polygon fill="url(#g-ll)" points="140,348 256,340 256,484"/>

  <!-- Lower-right facet -->
  <polygon fill="url(#g-lr)" points="372,348 256,340 256,484"/>

  <!-- === Internal facet lines (crystal structure) === -->
  <line x1="256" y1="32" x2="256" y2="484" stroke="#93c5fd" stroke-opacity="0.2" stroke-width="1.5"/>
  <line x1="172" y1="152" x2="392" y2="248" stroke="#93c5fd" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="340" y1="152" x2="120" y2="248" stroke="#93c5fd" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="140" y1="348" x2="372" y2="348" stroke="#93c5fd" stroke-opacity="0.1" stroke-width="1"/>

  <!-- === Inner glow overlay === -->
  <ellipse cx="240" cy="210" rx="100" ry="130" fill="url(#g-glow)"/>

  <!-- === Edge highlight (left edge catch light) === -->
  <polyline
    points="256,32 172,152 120,248"
    fill="none"
    stroke="url(#g-edge)"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- === Top highlight (specular) === -->
  <polygon fill="#dbeafe" opacity="0.35" points="256,32 300,100 220,100"/>

  <!-- === Spark — 4-pointed star accent === -->
  <polygon fill="url(#g-spark)" points="
    400,56
    408,80
    432,88
    408,96
    400,120
    392,96
    368,88
    392,80
  "/>
  <!-- Spark inner bright core -->
  <circle cx="400" cy="88" r="6" fill="#fef3c7" opacity="0.9"/>

  <style>
    @media (prefers-color-scheme: dark) {
      /* In dark mode, boost brightness of all gradient stops */
      /* SVG CSS can't redefine gradient stops, so we add a brightness overlay */
    }
  </style>
</svg>
