<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="color-scheme" content="light dark" />
		<meta name="robots" content="noindex, nofollow" />
		<meta name="format-detection" content="telephone=no" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<title>Something went wrong | WebForge</title>
		<style>
			:root {
				--background: oklch(1 0 0);
				--foreground: oklch(0.145 0 0);
				--muted: oklch(0.965 0 0);
				--muted-foreground: oklch(0.556 0 0);
				--border: oklch(0.922 0 0);
				--primary: oklch(0.205 0 0);
				--primary-foreground: oklch(0.985 0 0);
			}
			@media (prefers-color-scheme: dark) {
				:root {
					--background: oklch(0.145 0 0);
					--foreground: oklch(0.985 0 0);
					--muted: oklch(0.269 0 0);
					--muted-foreground: oklch(0.708 0 0);
					--border: oklch(0.269 0 0);
					--primary: oklch(0.985 0 0);
					--primary-foreground: oklch(0.205 0 0);
				}
			}
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				-webkit-tap-highlight-color: transparent;
			}
			html {
				overscroll-behavior: none;
				-webkit-font-smoothing: antialiased;
				-moz-osx-font-smoothing: grayscale;
			}
			body {
				font-family: system-ui, -apple-system, sans-serif;
				display: flex;
				justify-content: center;
				align-items: center;
				min-height: 100vh;
				margin: 0;
				background: var(--background);
				color: var(--foreground);
				user-select: none;
				-webkit-touch-callout: none;
				touch-action: manipulation;
			}
			.container {
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				min-height: 60vh;
				gap: 0.5rem;
				padding: 1rem;
				text-align: center;
			}
			.icon {
				margin-bottom: 0.5rem;
				color: #ef4444;
			}
			.icon svg {
				width: 48px;
				height: 48px;
				stroke-width: 1.5;
			}
			h1 {
				font-size: 1.5rem;
				font-weight: 600;
				letter-spacing: -0.025em;
				margin: 0;
			}
			.description {
				margin-top: 0.25rem;
				font-size: 0.875rem;
				color: var(--muted-foreground);
				line-height: 1.625;
				max-width: 28rem;
			}
			.home-link {
				display: inline-flex;
				align-items: center;
				justify-content: center;
				gap: 0.5rem;
				height: 2.25rem;
				margin-top: 2rem;
				padding: 0 1rem;
				font-size: 0.875rem;
				font-weight: 500;
				line-height: 1;
				text-decoration: none;
				border-radius: 0.375rem;
				background: var(--primary);
				color: var(--primary-foreground);
				box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
				transition:
					background 0.15s,
					opacity 0.15s;
			}
			.home-link:hover {
				opacity: 0.9;
			}
			.home-link svg {
				width: 16px;
				height: 16px;
				flex-shrink: 0;
			}
			@keyframes fadeIn {
				from {
					opacity: 0;
				}
				to {
					opacity: 1;
				}
			}
			.error-id-btn {
				display: none;
				align-items: center;
				justify-content: center;
				gap: 0.375rem;
				height: 1.75rem;
				margin: 2rem auto 0;
				padding: 0 0.625rem;
				font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace;
				font-size: 0.75rem;
				color: var(--muted-foreground);
				background: transparent;
				border: 1px solid transparent;
				border-radius: 0.375rem;
				cursor: pointer;
				transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1);
				user-select: text;
			}
			.error-id-btn:hover {
				color: var(--foreground);
				background-color: var(--muted);
				border-color: var(--border);
			}
			@supports (color: color-mix(in lab, red, red)) {
				.error-id-btn:hover {
					background-color: color-mix(in oklab, var(--muted) 50%, transparent);
				}
			}
			.error-id-btn svg {
				width: 12px;
				height: 12px;
				flex-shrink: 0;
			}
			.error-id-btn .copied-text {
				color: #22c55e;
			}
			.error-id-btn .copied-icon {
				color: #22c55e;
			}
			.error-id-btn .fade-in {
				animation: fadeIn 150ms ease-out;
			}
			.raw-message {
				display: none;
			}
		</style>
	</head>
	<body>
		<div class="container" role="alert">
			<div class="icon" aria-hidden="true">
				<!-- Inline SVG: lucide server-crash icon -->
				<svg
					xmlns="http://www.w3.org/2000/svg"
					viewBox="0 0 24 24"
					fill="none"
					stroke="currentColor"
					stroke-linecap="round"
					stroke-linejoin="round"
				>
					<path
						d="M6 10H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-2"
					/>
					<path
						d="M6 14H4a2 2 0 0 0-2 2v4a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-4a2 2 0 0 0-2-2h-2"
					/>
					<path d="M6 6h.01" />
					<path d="M6 18h.01" />
					<path d="m13 6-4 6h6l-4 6" />
				</svg>
			</div>
			<h1>Something went wrong</h1>
			<p class="description">
				Oops! Something broke on our end. We&rsquo;re looking into it &mdash; please
				try again in a moment.
			</p>
			<span class="raw-message" id="raw-message">%sveltekit.error.message%</span>
			<a class="home-link" href="/">
				<svg
					xmlns="http://www.w3.org/2000/svg"
					viewBox="0 0 24 24"
					fill="none"
					stroke="currentColor"
					stroke-width="2"
					stroke-linecap="round"
					stroke-linejoin="round"
				>
					<path d="m12 19-7-7 7-7" />
					<path d="M19 12H5" />
				</svg>
				Go to homepage
			</a>
			<button type="button" class="error-id-btn" id="error-id-btn" onclick="copyErrorId()">
				<!-- Copy icon (lucide copy) -->
				<svg
					id="copy-icon"
					xmlns="http://www.w3.org/2000/svg"
					viewBox="0 0 24 24"
					fill="none"
					stroke="currentColor"
					stroke-width="2"
					stroke-linecap="round"
					stroke-linejoin="round"
				>
					<rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
					<path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
				</svg>
				<!-- Check icon (lucide check) — shown after copy -->
				<svg
					id="check-icon"
					class="copied-icon"
					xmlns="http://www.w3.org/2000/svg"
					viewBox="0 0 24 24"
					fill="none"
					stroke="currentColor"
					stroke-width="2"
					stroke-linecap="round"
					stroke-linejoin="round"
					style="display: none"
				>
					<path d="M20 6 9 17l-5-5" />
				</svg>
				<span id="error-id-text"></span>
			</button>
		</div>
		<script>
			(function () {
				var raw = document.getElementById('raw-message');
				if (!raw) return;
				var text = raw.textContent || '';
				var match = text.match(/\(Reference:\s*([^)]+)\)/);
				if (!match) return;
				var errorId = match[1].trim();
				var btn = document.getElementById('error-id-btn');
				var label = document.getElementById('error-id-text');
				if (!btn || !label) return;
				label.textContent = 'Reference: ' + errorId;
				btn.style.display = 'flex';
				btn.setAttribute('data-error-id', errorId);
			})();

			var _copyTimeout;
			function applyFadeIn(el) {
				el.classList.remove('fade-in');
				void el.offsetWidth;
				el.classList.add('fade-in');
			}
			function copyErrorId() {
				var btn = document.getElementById('error-id-btn');
				if (!btn) return;
				var id = btn.getAttribute('data-error-id');
				if (!id) return;
				var copyIcon = document.getElementById('copy-icon');
				var checkIcon = document.getElementById('check-icon');
				var label = document.getElementById('error-id-text');
				if (!copyIcon || !checkIcon || !label) return;

				if (navigator.clipboard) {
					navigator.clipboard.writeText(id);
				}
				copyIcon.style.display = 'none';
				checkIcon.style.display = 'block';
				label.textContent = 'Copied!';
				label.className = 'copied-text';
				applyFadeIn(checkIcon);
				applyFadeIn(label);

				clearTimeout(_copyTimeout);
				_copyTimeout = setTimeout(function () {
					copyIcon.style.display = 'block';
					checkIcon.style.display = 'none';
					label.textContent = 'Reference: ' + id;
					label.className = '';
					applyFadeIn(copyIcon);
					applyFadeIn(label);
				}, 2000);
			}
		</script>
	</body>
</html>
