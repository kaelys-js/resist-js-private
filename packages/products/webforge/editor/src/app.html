<!doctype html>
<html lang="%lang%" dir="%dir%" data-theme="" data-sidebar-width="">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="color-scheme" content="light dark" />
		<meta name="robots" content="noindex, nofollow" />
		<meta name="format-detection" content="telephone=no" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="{{APP_NAME}}" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="32x32" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<script nonce="%sveltekit.nonce%">
			(function () { try {
				var d = document.documentElement;
				// Mode — prevent dark/light flash (existing)
				var m = localStorage.getItem('app:mode');
				var dark = m === 'dark' || (m !== 'light' && matchMedia('(prefers-color-scheme:dark)').matches);
				if (dark) d.classList.add('dark');
				d.style.colorScheme = dark ? 'dark' : 'light';
				// Theme — server injects data-theme via cookie; localStorage fallback for first visit
				var t = d.getAttribute('data-theme');
				if (!t) { t = localStorage.getItem('app:theme') || ''; if (t) d.setAttribute('data-theme', t); }
				// Sidebar width — server injects data-sidebar-width via cookie
				var sw = d.getAttribute('data-sidebar-width');
				if (sw && +sw > 0) d.style.setProperty('--sidebar-width', sw + 'px');
			} catch (e) { console.error('[{{APP_NAME}}] Preferences could not be loaded:', e); }
			})();
		</script>
		%sveltekit.head%
	</head>
	<body class="antialiased" data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
