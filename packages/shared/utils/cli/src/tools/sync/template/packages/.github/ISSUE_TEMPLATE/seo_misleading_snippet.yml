# yaml-language-server: $schema=https://json.schemastore.org/github-issue-forms.json

# -------------------------------------------------------------------
# ✅ GitHub Issue Form: SEO Misleading Snippet
# -------------------------------------------------------------------
# Purpose: Capture and triage instances where the SERP snippet (meta title/description)
# does not accurately reflect on-page content, which can harm SEO and user trust.
# Form is tool-agnostic and fits enterprise-scale search integrity workflows.
# -------------------------------------------------------------------

version: 1.0.0
form_id: seo-misleading-snippet

name: "⚠️ SEO Misleading Snippet"
description: Report metadata mismatches between SERP titles/descriptions and actual page content.
title: "[SEO Misleading Snippet]: "
labels:
  - seo
  - serp
  - meta
assignees: []

body:

  # --------------------------------------------------------------------
  # SECTION: Submitter Identity (REQUIRED)
  # --------------------------------------------------------------------
  - type: input
    id: submitted_by
    attributes:
      label: Submitted By
      description: GitHub username or email of the person reporting the snippet mismatch.
      placeholder: "@your-username"
      value: "@{{ github.actor }}"
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: Snippet Mismatch Description (REQUIRED)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 🔍 Misleading Snippet Details  
        Provide details about what is misleading in the snippet and how it differs from actual page content.

  - type: textarea
    id: snippet_mismatch
    attributes:
      label: Misleading Snippet Details
      description: Describe the SERP result, user expectations, and actual page experience.
      placeholder: |
        - Page: /pricing  
        - SERP title says "Free Forever", but page promotes a paid plan  
        - Meta description includes "100% uptime", but uptime is not mentioned on page  
        - Result was seen on Google.com on June 3, 2025
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: Triage & Impact Assessment (REQUIRED)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 🚦 Triage & Impact  
        Help assess the scope and severity of the misleading metadata.

  - type: dropdown
    id: priority
    attributes:
      label: Priority Level
      description: How should this metadata issue be prioritized?
      options:
        - "P0 – top priority"
        - "P1 – high priority"
        - "P2 – normal priority"
        - "P3 – low priority"
      default: "P2 – normal priority"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Technical Severity
      description: What is the technical or reputational severity of this snippet mismatch?
      options:
        - "Critical – potential legal, trust, or compliance concern"
        - "High – strong user dissatisfaction or clickbait behavior"
        - "Medium – unclear value proposition or outdated messaging"
        - "Low – cosmetic inconsistency only"
      default: "Medium – unclear value proposition or outdated messaging"
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      description: How quickly should this mismatch be addressed?
      options:
        - "Critical – resolve immediately"
        - "High – fix this sprint"
        - "Medium – resolve in next 2 sprints"
        - "Low – backlog for future cleanup"
      default: "Next cycle – backlog for future cleanup"
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Business/User Impact
      description: Who or what is negatively affected by this snippet discrepancy?
      options:
        - "Org-wide – brand reputation or conversion loss"
        - "Team-wide – feature or product misalignment"
        - "Single page or query – limited scope"
        - "Unclear – needs investigation"
      default: "Team-wide – feature or product misalignment"
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: References & Supporting Sources
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 🔗 References & Evidence  
        Include links or notes from SERP views, metadata audit tools, or GSC data.

  - type: textarea
    id: references
    attributes:
      label: References / Context
      description: URLs or tools showing the mismatch, screenshots, or metadata reports.
      placeholder: |
        - GSC HTML Improvements section  
        - https://search.google.com/test/rich-results  
        - Screenshot of SERP snippet vs page  
        - Metadata export from crawler audit
    validations:
      required: false

  # --------------------------------------------------------------------
  # SECTION: Attachments
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 📂 Attachments  
        Upload screenshots, audits, or JSON snippets showing meta issues.

  - type: textarea
    id: attachments
    attributes:
      label: Supporting Artifacts
      description: Paste or attach any exports, screenshots, or code blocks related to the issue.
      placeholder: |
        ```html
        <title>Try our platform – Free Forever</title>
        <meta name="description" content="Enjoy 100% uptime and no cost.">
        ```
    validations:
      required: false

  # --------------------------------------------------------------------
  # SECTION: Confirmation (REQUIRED)
  # --------------------------------------------------------------------
  - type: checkboxes
    id: acknowledgment
    attributes:
      label: Submitter Confirmation
      description: Confirm the mismatch has been verified before submission.
      options:
        - label: I confirm this snippet issue has been validated and is not a false positive.
    validations:
      required: true
