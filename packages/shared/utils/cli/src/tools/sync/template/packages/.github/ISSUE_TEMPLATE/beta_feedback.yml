# yaml-language-server: $schema=https://json.schemastore.org/github-issue-forms.json

# -------------------------------------------------------------------
# ✅ GitHub Issue Form: Customer Beta Tester Feedback
# -------------------------------------------------------------------
# Purpose: Capture structured feedback from external beta testers on new features,
# integrations, or product enhancements. Enterprise-ready and tooling-agnostic.
# -------------------------------------------------------------------

version: 1.0.0
form_id: customer-beta-feedback

name: "🧪 Customer Beta Tester Feedback"
description: Capture structured feedback from external beta testers on new functionality or features.
title: "[Beta Feedback]: "
labels:
  - beta
  - feedback
  - customer
assignees: []

body:

  # --------------------------------------------------------------------
  # SECTION: Submitter Identity (REQUIRED)
  # --------------------------------------------------------------------
  - type: input
    id: submitted_by
    attributes:
      label: Submitted By
      description: GitHub username or name of the person logging this feedback.
      placeholder: "@your-username"
      value: "@{{ github.actor }}"
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: Feature or Surface Area (REQUIRED)
  # --------------------------------------------------------------------
  - type: textarea
    id: summary
    attributes:
      label: Feature or Area Tested
      description: What part of the product was tested? (e.g. onboarding, CLI, dashboard, API).
      placeholder: |
        - Area: New onboarding experience  
        - Component: CLI setup for biome  
        - Flow: Deploy via Argo dashboard (beta flag enabled)
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: Feedback Details (OPTIONAL)
  # --------------------------------------------------------------------
  - type: textarea
    id: context
    attributes:
      label: What Worked / Didn’t
      description: Summarize key takeaways from the tester—positives, blockers, regressions, confusion points.
      placeholder: |
        - Setup flow was smooth; auto-config detected Svelte correctly  
        - Confusion: Docs link in CLI was outdated  
        - Regression: `biome check` failed inside Docker with valibot schema  
        - Suggestion: Add prompt to opt into telemetry
    validations:
      required: false

  # --------------------------------------------------------------------
  # SECTION: Tester Contact or Reference (OPTIONAL)
  # --------------------------------------------------------------------
  - type: input
    id: references
    attributes:
      label: Tester Org / Contact
      description: Optional name, handle, or CRM/customer ID for traceability.
      placeholder: "e.g., @tester-handle, acme-corp, HubSpot ID #83219"
    validations:
      required: false

  # --------------------------------------------------------------------
  # SECTION: Feedback Triage Metadata (REQUIRED)
  # --------------------------------------------------------------------
  - type: dropdown
    id: severity
    attributes:
      label: Feedback Severity
      description: How critical was the feedback or issue raised?
      options:
        - "Critical – data loss, blocker, or failed core task"
        - "High – regression, confusing UX, or broken flow"
        - "Medium – minor bug or inconsistent behavior"
        - "Low – polish or enhancement idea"
      default: "Medium – minor bug or inconsistent behavior"
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      description: How soon should this feedback be reviewed or acted on?
      options:
        - "Immediate – required for launch or rollout"
        - "High – review this sprint"
        - "Medium – review next sprint"
        - "Low – backlog tracking"
      default: "Medium – review next sprint"
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Product Impact
      description: How wide-reaching is the impact of this feedback?
      options:
        - "Org-wide – affects user trust, data, or core flows"
        - "Team-wide – impacts a key feature or launch"
        - "Single user – isolated to niche config or use case"
        - "Unclear – needs investigation"
      default: "Team-wide – impacts a key feature or launch"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority Level
      description: Set overall priority for follow-up based on signal and scope.
      options:
        - "P0 – critical to resolve"
        - "P1 – high priority"
        - "P2 – normal priority"
        - "P3 – track for iteration"
      default: "P2 – normal priority"
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: Acknowledgment (REQUIRED)
  # --------------------------------------------------------------------
  - type: checkboxes
    id: acknowledgment
    attributes:
      label: Confirmation
      description: Confirm this feedback is from an active beta tester and shared with the right stakeholders.
      options:
        - label: This feedback came from an active beta tester.
        - label: I have shared or tagged the product owner (if needed).
    validations:
      required: true
