# yaml-language-server: $schema=https://json.schemastore.org/github-issue-forms.json

# -------------------------------------------------------------------
# ✅ GitHub Issue Form: Product/Engineering Alignment Issue
# -------------------------------------------------------------------
# Purpose: Flag process or scope misalignment between product and engineering.
# Helps teams document blockers, miscommunication, or scope vs feasibility gaps.
# -------------------------------------------------------------------

version: 1.0.0
form_id: product-engineering-alignment

name: "🧭 Product/Engineering Alignment Issue"
description: Flag misalignment between product scope, priorities, and engineering reality.
title: "[Alignment Issue]: "
labels:
  - product
  - engineering
  - alignment
assignees: []

body:

  # --------------------------------------------------------------------
  # SECTION: Submitter Info (REQUIRED)
  # --------------------------------------------------------------------
  - type: input
    id: submitted_by
    attributes:
      label: Submitted By
      description: GitHub username or full name of the person submitting this alignment issue.
      placeholder: "@your-username"
      value: "@{{ github.actor }}"
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: Summary (REQUIRED)
  # --------------------------------------------------------------------
  - type: textarea
    id: summary
    attributes:
      label: Issue Summary
      description: What feels misaligned between product goals and engineering constraints?
      placeholder: |
        - Scope creep introduced mid-sprint without tech review  
        - Delivery deadlines do not account for CI regression effort  
        - Metrics defined in OKRs lack instrumentation in current stack
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: Context & Background (OPTIONAL)
  # --------------------------------------------------------------------
  - type: textarea
    id: context
    attributes:
      label: Background
      description: Add timeline, scope, constraints, or any past resolution attempts.
      placeholder: |
        - Original launch scope locked on June 5  
        - Engineering flagged caching complexity on June 7  
        - Product added new KPI measurement on June 12 without architecture change review  
        - Retrospective in May raised a similar concern (PR #842)
    validations:
      required: false

  # --------------------------------------------------------------------
  # SECTION: References (OPTIONAL)
  # --------------------------------------------------------------------
  - type: input
    id: references
    attributes:
      label: Related Docs or Discussions
      description: Add links to roadmap docs, planning notes, issue threads, retros, etc.
      placeholder: |
        - https://notion.so/2025-Q3-Roadmap  
        - #product-dev thread on 2025-06-04  
        - Figma: Timeline flow v3  
        - Related: #1321 or #PR882
    validations:
      required: false

  # --------------------------------------------------------------------
  # SECTION: Triage Metadata (REQUIRED)
  # --------------------------------------------------------------------
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How significant is the misalignment or risk to execution?
      options:
        - "Critical – delivery or quality at major risk"
        - "High – execution path unclear or unrealistic"
        - "Medium – tension in timeline or implementation detail"
        - "Low – alignment gap, but not blocking"
      default: "Medium – tension in timeline or implementation detail"
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      description: When should this be resolved?
      options:
        - "Immediate – sprint-critical"
        - "High – within the next planning cycle"
        - "Medium – end of quarter OKR review"
        - "Low – track for async resolution"
      default: "High – within the next planning cycle"
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Scope of Impact
      description: Who or what is affected by the misalignment?
      options:
        - "Org-wide – cross-functional OKRs or releases"
        - "Team-wide – product and engineering coordination"
        - "Feature-level – isolated to scoped implementation"
        - "Unclear – needs refinement"
      default: "Team-wide – product and engineering coordination"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Assign an overall priority for resolution or escalation.
      options:
        - "P0 – critical fix needed"
        - "P1 – high priority to unblock delivery"
        - "P2 – normal alignment check"
        - "P3 – log for later review"
      default: "P2 – normal alignment check"
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: Confirmation (REQUIRED)
  # --------------------------------------------------------------------
  - type: checkboxes
    id: acknowledgment
    attributes:
      label: Confirmation
      description: Confirm this is intended to improve collaboration constructively.
      options:
        - label: I’ve spoken to someone on the other team before submitting this.
        - label: This issue is meant to realign, not blame.
    validations:
      required: true
