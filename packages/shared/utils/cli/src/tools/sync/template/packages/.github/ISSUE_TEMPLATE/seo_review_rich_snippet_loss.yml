# yaml-language-server: $schema=https://json.schemastore.org/github-issue-forms.json

# -------------------------------------------------------------------
# ✅ GitHub Issue Form: SEO Review Rich Snippet Loss
# -------------------------------------------------------------------
# Purpose: Capture and investigate loss of review-based rich snippets (stars, ratings, etc.)
# from search engine result pages (SERPs) due to schema changes, Google updates, or errors.
# Structured for SEO teams in platform-agnostic, enterprise-scale environments.
# -------------------------------------------------------------------

version: 1.0.0
form_id: seo-review-snippet-loss

name: "⭐ SEO Review Rich Snippet Loss"
description: Report the loss of review rich snippets (e.g., stars, rating schema) from Google SERPs.
title: "[SEO Review Rich Snippet Loss]: "
labels:
  - seo
  - rich-snippets
  - schema
  - reviews
assignees: []

body:

  # --------------------------------------------------------------------
  # SECTION: Submitter Identity (REQUIRED)
  # --------------------------------------------------------------------
  - type: input
    id: submitted_by
    attributes:
      label: Submitted By
      description: GitHub username or email of the person submitting the report.
      placeholder: "@your-username"
      value: "@{{ github.actor }}"
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: Snippet Loss Description (REQUIRED)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## ❌ Review Snippet Loss Details  
        Provide context for when, where, and how review snippets disappeared from SERPs.

  - type: textarea
    id: review_snippet_loss
    attributes:
      label: Review Snippet Loss Details
      description: Describe which pages lost star ratings or review-based enhancements in search.
      placeholder: |
        - Product page: /store/widget-x  
        - Review schema type: Product  
        - Loss detected on 2025-05-22  
        - GSC shows valid schema, but no snippets appearing  
        - Structured data test shows no critical errors
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: Triage & Impact Assessment (REQUIRED)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 🚦 Triage & Impact  
        Estimate the scale and urgency of this snippet regression.

  - type: dropdown
    id: priority
    attributes:
      label: Priority Level
      description: How should this issue be prioritized relative to other SEO issues?
      options:
        - "P0 – top priority"
        - "P1 – high priority"
        - "P2 – normal priority"
        - "P3 – low priority"
      default: "P2 – normal priority"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: What is the technical severity of this loss?
      options:
        - "Critical – multiple templates affected across site"
        - "High – significant traffic or CTR loss observed"
        - "Medium – partial template loss or isolated content"
        - "Low – minimal exposure or test environment"
      default: "Medium – partial template loss or isolated content"
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      description: How quickly should the issue be addressed?
      options:
        - "Critical – immediate resolution required"
        - "High – resolve this sprint"
        - "Medium – fix within 2 sprints"
        - "Low – monitor or defer"
      default: "Next cycle – monitor or defer"
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Business/User Impact
      description: Who or what is affected by the snippet loss?
      options:
        - "Org-wide – impacts brand trust and CTR across pages"
        - "Team-wide – product/category level performance drop"
        - "Single page/user – isolated regression"
        - "Unclear – requires analysis"
      default: "Team-wide – product/category level performance drop"
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: References & Diagnostics
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 🔎 References & Validation  
        Include supporting links or diagnostics from schema tools or dashboards.

  - type: textarea
    id: references
    attributes:
      label: References / Context
      description: Provide links to GSC, Rich Results Test, schema JSON, or monitoring reports.
      placeholder: |
        - https://search.google.com/test/rich-results  
        - GSC Enhancement report: Product Reviews  
        - Internal observability dashboard  
        - Lighthouse or schema markup tool output
    validations:
      required: false

  # --------------------------------------------------------------------
  # SECTION: Attachments
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 📂 Attachments  
        Paste or link to screenshots, structured data JSON, or GSC exports.

  - type: textarea
    id: attachments
    attributes:
      label: Supporting Artifacts
      description: Add screenshots or code snippets related to the schema or SERP results.
      placeholder: |
        ```json
        {
          "@type": "Product",
          "name": "Widget X",
          "aggregateRating": {
            "@type": "AggregateRating",
            "ratingValue": "4.5",
            "reviewCount": "52"
          }
        }
        ```
    validations:
      required: false

  # --------------------------------------------------------------------
  # SECTION: Confirmation (REQUIRED)
  # --------------------------------------------------------------------
  - type: checkboxes
    id: acknowledgment
    attributes:
      label: Submitter Confirmation
      description: Confirm that the snippet loss has been internally reviewed.
      options:
        - label: I confirm this review snippet issue is real, reproducible, and internally validated.
    validations:
      required: true
