# yaml-language-server: $schema=https://json.schemastore.org/github-issue-forms.json

version: 1.0.0
form_id: performance-issue

name: "🚀 Performance Issue"
description: Report performance degradation, bottlenecks, or latency issues affecting systems or user experience.
labels:
  - performance

body:

  # --------------------------------------------------------------------
  # SECTION: Submitter Metadata (REQUIRED)
  # --------------------------------------------------------------------
  - type: input
    id: submitted_by
    attributes:
      label: Submitted By
      description: GitHub username of the person reporting the issue.
      placeholder: "@your-username"
      value: "@{{ github.actor }}"
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: Summary (REQUIRED)
  # --------------------------------------------------------------------
  - type: input
    id: title
    attributes:
      label: 📝 Summary
      description: Short summary of the performance issue.
      placeholder: "e.g., API latency spike on staging after deploy"
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: Core Details (REQUIRED)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 📍 Where and When is the Slowdown?  
        Describe the location, timing, and consistency of the performance problem.

  - type: textarea
    id: details
    attributes:
      label: Affected Area and Reproduction
      description: |
        Include:
        - Affected system (frontend, backend, database, CI/CD)
        - Steps to reproduce (if applicable)
        - Timeframe of observation
        - Frequency: always, sometimes, etc.
      render: markdown
    validations:
      required: true

  - type: textarea
    id: metrics
    attributes:
      label: 📊 Metrics or Benchmarks
      description: |
        Include performance signals:
        - Latency, memory/CPU usage, flamegraphs
        - Logs or trace output
        - Dashboard links (e.g., Umami, Sentry, Cloudflare, GCP)
      render: markdown
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: 🚨 Impact and Severity
      description: |
        - Who is affected (users, internal teams)?  
        - Is this blocking deploys, revenue, app reviews?
      render: markdown
    validations:
      required: true

  - type: dropdown
    id: reproducibility
    attributes:
      label: 🔁 Reproducibility
      description: How often does this issue occur?
      options:
        - Always
        - Often
        - Sometimes
        - Rarely
        - Unknown
      default: Unknown
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: Environment Context (REQUIRED)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 🧪 Context and Environment  
        Describe where the issue is happening and what may be influencing it.

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        - Production, staging, CI/CD, local dev?
        - Specific region, service, or cluster?
      render: markdown
    validations:
      required: true

  - type: textarea
    id: changes
    attributes:
      label: 📦 Recent Changes
      description: |
        - Recent deployments or merges?  
        - Any infrastructure, dependency, or runtime updates?
      render: markdown
    validations:
      required: true

  - type: dropdown
    id: regression
    attributes:
      label: 🧭 Is this a regression?
      description: Did performance degrade compared to a previous baseline?
      options:
        - Yes, performance used to be better
        - No, it's always been like this
        - Not sure
      default: Not sure
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: Triage Metadata (REQUIRED)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 🚦 Triage Metadata  
        Help prioritize investigation and response.

  - type: dropdown
    id: priority
    attributes:
      label: ⏱️ Priority
      description: How urgent is this issue?
      options:
        - P0 – Critical (urgent user impact or revenue risk)
        - P1 – High (user-visible but not critical)
        - P2 – Medium (internal or minor performance concern)
        - P3 – Low (non-blocking or cosmetic)
      default: P2 – Medium (internal or minor performance concern)
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Technical Severity
      description: How bad is the performance impact technically?
      options:
        - Low – minor lag or inefficiency
        - Medium – noticeable but non-blocking
        - High – slows key workflows or user experience
        - Critical – causes timeouts, crashes, or system errors
      default: Medium – noticeable but non-blocking
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      description: When does this need to be resolved?
      options:
        - Low – next quarter
        - Medium – within a few sprints
        - High – this sprint
        - Critical – urgent fix needed
      default: Medium – within a few sprints
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Scope of Impact
      description: Who is affected and how broadly?
      options:
        - Single user or team
        - Multiple internal teams
        - Public users in staging
        - Production users or customers
      default: Multiple internal teams
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: Additional Context (Optional)
  # --------------------------------------------------------------------
  - type: input
    id: domain
    attributes:
      label: 👥 Suggested Team or Domain
      description: Who might be best to investigate?
      placeholder: "e.g., frontend, infra, auth, observability"

  - type: textarea
    id: tools
    attributes:
      label: 🛠️ Stack or Tooling Context
      description: |
        Relevant stack components, infra, or frameworks:
        - Bun, TypeScript, Valibot, Biome  
        - Svelte, Docker, K8s, GCP, Argo  
        - Sentry, Umami, Stripe, Cloudflare
      render: markdown

  - type: textarea
    id: attachments
    attributes:
      label: 📎 Attachments or Links
      description: |
        Upload or link to performance data:
        - HAR files, screenshots, trace logs  
        - Grafana/Sentry dashboards, test reports
      render: markdown

  # --------------------------------------------------------------------
  # SECTION: References & Confirmation (REQUIRED)
  # --------------------------------------------------------------------
  - type: input
    id: references
    attributes:
      label: Related Issues or PRs
      description: Link to any related issues, pull requests, or discussions.
      placeholder: "e.g., GitHub issue #123, PR #456"

  - type: checkboxes
    id: acknowledgment
    attributes:
      label: Confirmation
      description: Confirm the report includes enough detail to act on.
      options:
        - label: I have provided enough technical data to start investigation
        - label: I understand this issue may be prioritized based on urgency, severity, and impact
    validations:
      required: true
