# yaml-language-server: $schema=https://json.schemastore.org/github-issue-forms.json

# -------------------------------------------------------------------
# ✅ GitHub Issue Form: SEO Duplicate H1 Tags
# -------------------------------------------------------------------
# Purpose: Report pages using multiple <h1> elements, which negatively affect SEO structure,
# accessibility, and semantic HTML practices.
# Generic, tool-agnostic, and compatible with all frontend environments.
# -------------------------------------------------------------------

version: 1.0.0
form_id: seo-duplicate-h1-tags

name: "🔠 SEO Duplicate H1 Tags"
description: Report multiple H1 tags used on a single page that may impact SEO or accessibility.
title: "[SEO Duplicate H1 Tags]: "
labels:
  - seo
  - headings
  - accessibility
assignees: []

body:

  # --------------------------------------------------------------------
  # SECTION: Submitter Identity (REQUIRED)
  # --------------------------------------------------------------------
  - type: input
    id: submitted_by
    attributes:
      label: Submitted By
      description: GitHub username or email of the individual submitting the issue.
      placeholder: "@your-username"
      value: "@{{ github.actor }}"
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: Duplicate H1 Description (REQUIRED)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 🔍 Duplicate H1 Details  
        Provide context about the affected page and incorrect heading usage.

  - type: textarea
    id: duplicate_h1_details
    attributes:
      label: Duplicate H1 Details
      description: Identify the URL, number of H1s found, and what the expected structure should be.
      placeholder: |
        - URL: /docs/integration-guide  
        - Found 3 H1s instead of 1  
        - Includes page title, tab label, and modal title all using <h1>  
        - Expected: Only page title should be <h1>; others should use <h2> or <h3>
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: Triage & Impact (REQUIRED)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 🚦 Triage & Impact  
        Help assess the business or technical priority of resolving this issue.

  - type: dropdown
    id: severity
    attributes:
      label: Technical Severity
      description: How serious is the issue from a technical or semantic HTML standpoint?
      options:
        - "Critical – site-wide or repeated in shared components"
        - "High – impacts major flows or reusable sections"
        - "Medium – isolated page-level issue"
        - "Low – minor visibility or non-user-facing"
      default: "Medium – isolated page-level issue"
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      description: How quickly should this be addressed?
      options:
        - "Critical – fix immediately"
        - "High – fix this sprint"
        - "Medium – fix in next 2 sprints"
        - "Low – backlog for future pass"
      default: "Next cycle – backlog for future pass"
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Business/User Impact
      description: What level of business or user-facing effect does this have?
      options:
        - "Org-wide – major semantic or compliance concern"
        - "Team-wide – core product surfaces or templates"
        - "Single user or page – isolated view or modal"
        - "Unclear – needs validation"
      default: "Team-wide – core product surfaces or templates"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: What is the appropriate priority for fixing this issue?
      options:
        - "P0 – top priority"
        - "P1 – high priority"
        - "P2 – normal priority"
        - "P3 – low priority"
      default: "P2 – normal priority"
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: References & Evidence (OPTIONAL)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 🔗 References & Evidence  
        Include any audit results, issue threads, or source documentation.

  - type: textarea
    id: references
    attributes:
      label: References / Context
      description: Link to dashboards, PRs, accessibility audits, or code comments relevant to the issue.
      placeholder: |
        - Lighthouse audit for /pricing  
        - Screaming Frog or Ahrefs crawl  
        - PR #456 introduced layout duplication  
        - Sentry error: Unexpected heading structure in SSR
    validations:
      required: false

  # --------------------------------------------------------------------
  # SECTION: Attachments (OPTIONAL)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 📂 Attachments  
        Provide HTML output, screenshots, or diagnostic output for better visibility.

  - type: textarea
    id: attachments
    attributes:
      label: Supporting Artifacts
      description: Paste annotated DOM snippets, audit logs, or UI screenshots.
      placeholder: |
        ```html
        <h1>Page Title</h1>
        <h1>Section Heading</h1>
        <h1>Modal Title</h1>
        ```
    validations:
      required: false

  # --------------------------------------------------------------------
  # SECTION: Confirmation (REQUIRED)
  # --------------------------------------------------------------------
  - type: checkboxes
    id: acknowledgment
    attributes:
      label: Submitter Confirmation
      description: Confirm this issue is reproducible and ready for triage.
      options:
        - label: I confirm this duplicate H1 issue has been validated and internally reviewed.
    validations:
      required: true
