# yaml-language-server: $schema=https://json.schemastore.org/github-issue-forms.json

# -------------------------------------------------------------------
# ✅ GitHub Issue Form: SEO CTR Drop
# -------------------------------------------------------------------
# Purpose: Report and triage a drop in organic click-through rate (CTR)
# across URLs, keyword clusters, or product surfaces.
# Compatible with enterprise-scale SEO operations and platform-agnostic.
# -------------------------------------------------------------------

version: 1.0.0
form_id: seo-ctr-drop

name: "📉 SEO CTR Drop"
description: Report a drop in organic click-through rate (CTR) for specific pages, queries, or keyword sets.
title: "[SEO CTR Drop]: "
labels:
  - seo
  - ctr
  - traffic
assignees: []

body:

  # --------------------------------------------------------------------
  # SECTION: Submitter Identity (REQUIRED)
  # --------------------------------------------------------------------
  - type: input
    id: submitted_by
    attributes:
      label: Submitted By
      description: GitHub username or email of the person reporting the issue.
      placeholder: "@your-username"
      value: "@{{ github.actor }}"
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: CTR Drop Description (REQUIRED)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 📉 CTR Drop Context  
        Describe what has changed that might have led to a decline in CTR.

  - type: textarea
    id: ctr_drop_context
    attributes:
      label: CTR Drop Context
      description: Include affected queries, URL(s), CTR %, impressions, rank position changes, or SERP changes.
      placeholder: |
        - URL: /docs/api-auth  
        - Query: "OAuth setup guide"  
        - CTR dropped from 12.3% to 5.2%  
        - Position unchanged (~4.2), but title changed in last deploy  
        - Snippet replaced by FAQ page from another domain
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: Triage & Impact (REQUIRED)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 🚦 Triage & Impact  
        Help assess how widespread and urgent the drop is.

  - type: dropdown
    id: severity
    attributes:
      label: Technical Severity
      description: How technically significant is the issue?
      options:
        - "Critical – affects major pages or keyword clusters"
        - "High – impacts high-CTR or campaign traffic"
        - "Medium – observable but not business-critical"
        - "Low – isolated or experimental"
      default: "Medium – observable but not business-critical"
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      description: When should this CTR issue be reviewed or mitigated?
      options:
        - "Critical – immediate review required"
        - "High – resolve this sprint"
        - "Medium – next 2 sprints"
        - "Low – monitor over time"
      default: "Next cycle – monitor over time"
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Business/User Impact
      description: What surface, flow, or area is affected?
      options:
        - "Org-wide – strategic pages or multi-region CTR loss"
        - "Team-wide – key user journeys or conversion paths"
        - "Single page or query – localized CTR drop"
        - "Unclear – needs more investigation"
      default: "Team-wide – key user journeys or conversion paths"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority Level
      description: How should this CTR drop be prioritized?
      options:
        - "P0 – top priority"
        - "P1 – high priority"
        - "P2 – normal priority"
        - "P3 – low priority"
      default: "P2 – normal priority"
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: References & Evidence (OPTIONAL)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 🔗 References & Signals  
        Include links to dashboards, GSC exports, changelogs, or competitor SERP shifts.

  - type: textarea
    id: references
    attributes:
      label: References / Context
      description: Add any supporting dashboards, search console insights, or audit tools.
      placeholder: |
        - GSC query report for /docs/api-auth  
        - Umami or GA4 traffic anomaly around June 2  
        - Ahrefs SERP snapshot from May 15 vs June 1  
        - Title/meta change log from last deploy
    validations:
      required: false

  # --------------------------------------------------------------------
  # SECTION: Attachments (OPTIONAL)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 📂 Attachments  
        Include CSV exports, annotated screenshots, or changelog diffs.

  - type: textarea
    id: attachments
    attributes:
      label: Supporting Artifacts
      description: Paste or link to visual diffs or raw metrics.
      placeholder: |
        ```csv
        Date,CTR,Impressions,Clicks,Avg Position
        2025-05-15,12.3%,891,110,4.1
        2025-06-01,5.2%,1043,54,4.2
        ```
    validations:
      required: false

  # --------------------------------------------------------------------
  # SECTION: Confirmation (REQUIRED)
  # --------------------------------------------------------------------
  - type: checkboxes
    id: acknowledgment
    attributes:
      label: Submitter Confirmation
      description: Confirm the CTR drop has been reviewed and is real and relevant.
      options:
        - label: I confirm this CTR issue is valid, reproducible, and has been reviewed internally.
    validations:
      required: true
