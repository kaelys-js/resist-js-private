# yaml-language-server: $schema=https://json.schemastore.org/github-issue-forms.json

# -------------------------------------------------------------------
# 📝 GitHub Issue Form: Abandonment Notice
# -------------------------------------------------------------------
# Logs the formal discontinuation of a proposed or active feature/module.
# Ensures traceability, context, and communication for future audits.
# -------------------------------------------------------------------

version: 1.0.0
form_id: abandonment-notice-form

name: "📉 Abandonment Notice"
description: Log the formal discontinuation of a proposed or active feature or module.
title:
  "[Abandonment] "
  placeholder: "e.g., Sunsetting legacy billing dashboard"

labels:
  - abandoned
  - deprecated
  - documentation
assignees: []

body:

  # --------------------------------------------------------------------
  # SECTION: Submitter Info
  # --------------------------------------------------------------------
  - type: input
    id: submitted_by
    attributes:
      label: Submitted By
      description: GitHub username or full name of the contributor.
      placeholder: "@your-username"
      value: "@{{ github.actor }}"
    validations:
      required: true

  - type: input
    id: co_authors
    attributes:
      label: Co-authors or Reviewers (Optional)
      description: Anyone who helped review or support this abandonment.
      placeholder: "@collaborator-name"
    validations:
      required: false

  # --------------------------------------------------------------------
  # SECTION: Issue Type & Summary
  # --------------------------------------------------------------------
  - type: dropdown
    id: issue_type
    attributes:
      label: What kind of issue are you reporting?
      options:
        - Abandonment
        - Sunset Plan
        - Deprecation Notice
        - Documentation Task
        - Other
      default: Abandonment
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: ✏️ Summary
      description: What is being abandoned and why?
      placeholder: |
        e.g., Dark mode for legacy dashboard is being sunset due to low adoption and shift to new design system.
      render: markdown
    validations:
      required: true

  - type: input
    id: component
    attributes:
      label: Affected Component or Area (Optional)
      description: Use consistent naming like "auth", "dashboard", "CI/CD", "API" — or say "Not sure".
      placeholder: "e.g., auth, dashboard, billing — or 'Not sure'"

  - type: input
    id: version
    attributes:
      label: Affected Version
      placeholder: "e.g., v3.5.2"
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Platform or Device (Optional)
      placeholder: "e.g., Android 14, iOS 17, Windows 11"

  - type: input
    id: env
    attributes:
      label: Environment Context (Optional)
      placeholder: "e.g., Kubernetes cluster, Node.js 20, Chrome 125"

  - type: input
    id: references
    attributes:
      label: Related PRs or Issues (Optional)
      placeholder: "e.g., PR #234, Issue #567"

  # --------------------------------------------------------------------
  # SECTION: Context and Reproduction (especially for bug reports)
  # --------------------------------------------------------------------
  - type: textarea
    id: context_steps
    attributes:
      label: Context or Steps
      description: What led to this abandonment? Any prior attempts to keep it active?
      placeholder: |
        - Originally requested by Growth Team Q1  
        - Evaluated usage analytics (low)  
        - Aligned with roadmap for unified experience  
        - Architecture council approved sunsetting on 2025-06-01
    validations:
      required: true

  - type: dropdown
    id: reproducibility
    attributes:
      label: Reproducibility (Optional)
      description: If applicable, was the issue with the feature reproducible?
      options:
        - "Always"
        - "Often"
        - "Sometimes"
        - "Rarely"
        - "Can't reproduce anymore"
        - "Not applicable"
      default: "Not applicable"

  - type: dropdown
    id: regression
    attributes:
      label: Has this behavior changed from before?
      description: Was this feature working as expected before?
      options:
        - "Yes – it worked previously but is being deprecated"
        - "No – it never reached stable adoption"
        - "Not sure"
      default: "Not sure"

  - type: textarea
    id: expected_actual
    attributes:
      label: Expected vs Actual Behavior
      description: What was originally expected of the feature, and what has happened over time?
      placeholder: |
        Expected: Feature would drive user adoption of new billing tools  
        Actual: Majority still use legacy paths; feature unused in 80% sessions
    validations:
      required: true

  - type: dropdown
    id: workaround
    attributes:
      label: Is there any workaround you’re using?
      description: Is there an alternative method or fallback path for users?
      options:
        - "Yes – workaround available"
        - "No – completely removed"
        - "Not sure"
      default: "Not sure"

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed Solution or Suggestion (Optional)
      description: Are there any follow-up actions or replacements suggested?
      placeholder: |
        e.g., Migrate remaining users to unified billing dashboard

  - type: textarea
    id: feature_use_case
    attributes:
      label: Use Case or Context (Optional)
      description: Why was this feature valuable before? What changed?
      placeholder: |
        e.g., Initially proposed to solve mobile lag, but new architecture resolved performance bottlenecks natively.

  - type: textarea
    id: impact
    attributes:
      label: Who or what is affected? (Optional)
      description: Helps prioritize the issue.
      placeholder: "e.g., Impacts legacy billing users on mobile"

  - type: input
    id: reproduction_link
    attributes:
      label: Reproduction Project (Optional)
      placeholder: "e.g., GitHub repo or legacy feature demo URL"

  - type: textarea
    id: logs
    attributes:
      label: Logs or Console Output (Optional)
      description: Paste relevant logs (redact any sensitive data if needed).
      render: plain
      placeholder: |
        e.g., Deprecation warnings logged since v3.4.0

  - type: textarea
    id: attachments
    attributes:
      label: Attachments (Optional)
      description: Include screenshots, markdown, changelogs, etc.
      render: markdown
      placeholder: |
        Paste screenshots or formatted text here.

  - type: input
    id: media_links
    attributes:
      label: Media or Demo Link (Optional)
      placeholder: "e.g., Loom video, internal wiki page"

  - type: dropdown
    id: preferred_outcome
    attributes:
      label: What are you hoping for?
      options:
        - Documentation update
        - Migration plan or support
        - Confirmation of abandonment
        - Just reporting for awareness
      default: Just reporting for awareness

  - type: dropdown
    id: user_urgency
    attributes:
      label: How urgent is this for you?
      description: Helps us prioritize based on user needs.
      options:
        - Blocking – I can’t continue work
        - High – I’m actively waiting on this
        - Medium – It’s important but not urgent
        - Low – Just wanted to share
      default: Medium – It’s important but not urgent

  - type: textarea
    id: additional_notes
    attributes:
      label: Anything else you'd like to add? (Optional)
      description: Include any other context, links, or notes not covered above.
      placeholder: "e.g., Sunset planned during Q3 infrastructure refactor"

  - type: checkboxes
    id: issue_stage
    attributes:
      label: Stage of this Issue (Optional)
      description: Where in the lifecycle is this issue?
      options:
        - label: New or recently discovered
        - label: Under discussion or being worked on
        - label: Needs more info or reproduction

  # --------------------------------------------------------------------
  # SECTION: Tags, History, Misc
  # --------------------------------------------------------------------
  - type: input
    id: suggested_labels
    attributes:
      label: Suggested Tags or Labels (Optional)
      description: Suggest any helpful tags for triage (e.g., deprecated, sunset, roadmap).
      placeholder: "e.g., deprecated, roadmap, billing"

  - type: checkboxes
    id: prior_issues
    attributes:
      label: Prior Reports (Optional)
      description: Has this been reported or discussed before?
      options:
        - label: I checked existing issues
        - label: This continues a previous issue or thread

  - type: input
    id: contact
    attributes:
      label: Optional Contact (Optional)
      placeholder: "Email or Discord (if you're okay with follow-up)"

  # --------------------------------------------------------------------
  # SECTION: Triage (Maintainer Use)
  # --------------------------------------------------------------------
  - type: dropdown
    id: severity
    attributes:
      label: Severity (Optional)
      description: Choose based on how badly this affects users or systems.
      options:
        - "Critical – blocks usage or is urgent"
        - "High – impacts many users or key systems"
        - "Medium – affects a segment of usage"
        - "Low – minor or cosmetic"
        - "Unclear"
      default: "Medium – affects a segment of usage"

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency (Optional)
      description: When does this need attention?
      options:
        - "Immediate – blocks release or workflow"
        - "High – should be picked up soon"
        - "Medium – next sprint or cycle"
        - "Low – future backlog"
        - "Unclear"
      default: "Medium – next sprint or cycle"

  - type: dropdown
    id: impact_scope
    attributes:
      label: Scope of Impact (Optional)
      description: Who is affected by this?
      options:
        - "User-facing – external developers or customers"
        - "Internal – affects team workflows"
        - "Infra-only – CI/CD, telemetry, etc."
        - "Unclear"
      default: "User-facing – external developers or customers"

  - type: dropdown
    id: priority
    attributes:
      label: Priority (Optional)
      description: Maintainer-assigned priority for roadmap and triage.
      options:
        - "P0 – must be addressed immediately"
        - "P1 – important, include soon"
        - "P2 – normal priority"
        - "P3 – nice-to-have or backlog"
        - "Unclear"
      default: "P2 – normal priority"

  # --------------------------------------------------------------------
  # SECTION: Final Confirmation
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        👉 Before submitting, please make sure to [review our contributing guide](../../blob/main/CONTRIBUTING.md) and [code of conduct](../../blob/main/CODE_OF_CONDUCT.md).

  - type: dropdown
    id: disclosure_preference
    attributes:
      label: Do you prefer to disclose this publicly?
      options:
        - Yes, it's okay to discuss openly
        - No, I’d prefer private follow-up
      default: Yes, it's okay to discuss openly

  - type: checkboxes
    id: acknowledgment
    attributes:
      label: Final Check – ready to submit?
      description: Tick the box once you’ve filled everything you can.
      options:
        - label: I’ve provided all relevant information and reviewed for clarity
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        🙏 Thanks for documenting this abandonment decision. This helps ensure transparency and organizational clarity.
