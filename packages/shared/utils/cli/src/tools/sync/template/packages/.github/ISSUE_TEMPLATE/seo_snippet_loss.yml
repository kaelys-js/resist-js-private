# yaml-language-server: $schema=https://json.schemastore.org/github-issue-forms.json

# -------------------------------------------------------------------
# ✅ GitHub Issue Form: SEO Snippet Loss
# -------------------------------------------------------------------
# Purpose: Capture and triage loss of SERP enhancements (e.g. featured snippets, sitelinks)
# which may indicate schema issues, algorithmic downgrades, or ranking shifts.
# Designed for platform-neutral SEO and analytics workflows.
# -------------------------------------------------------------------

version: 1.0.0
form_id: seo-snippet-loss

name: "🔻 SEO Snippet Loss"
description: Report loss of featured snippets, sitelinks, or other SERP enhancements from Google search results.
title: "[SEO Snippet Loss]: "
labels:
  - seo
  - serp
  - snippet
assignees: []

body:

  # --------------------------------------------------------------------
  # SECTION: Submitter Identity (REQUIRED)
  # --------------------------------------------------------------------
  - type: input
    id: submitted_by
    attributes:
      label: Submitted By
      description: GitHub username or contact of the person reporting the issue.
      placeholder: "@your-username"
      value: "@{{ github.actor }}"
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: Snippet Loss Description (REQUIRED)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 📉 Snippet Loss Details  
        Provide the context and evidence of a lost snippet or SERP feature.

  - type: textarea
    id: snippet_loss_details
    attributes:
      label: Snippet Loss Details
      description: Describe which snippet or enhancement was lost, including keyword, impact, and dates.
      placeholder: |
        - Keyword: "what is biome"  
        - Lost featured snippet on 2025-05-30  
        - Previously ranked #1 with snippet box  
        - Drop in impressions and CTR in GSC  
        - Structured data unchanged
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: Triage & Impact Assessment (REQUIRED)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 🚦 Triage & Impact  
        Estimate business impact and how urgently this needs investigation.

  - type: dropdown
    id: priority
    attributes:
      label: Priority Level
      description: How important is recovering this SERP enhancement?
      options:
        - "P0 – top priority"
        - "P1 – high priority"
        - "P2 – normal priority"
        - "P3 – low priority"
      default: "P2 – normal priority"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Technical Severity
      description: How technically disruptive is this snippet loss?
      options:
        - "Critical – widespread loss or core keyword affected"
        - "High – primary product/category impacted"
        - "Medium – page-level or specific term regression"
        - "Low – edge case or test variant"
      default: "Medium – page-level or specific term regression"
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      description: How soon should this issue be addressed?
      options:
        - "Critical – resolve immediately"
        - "High – address this sprint"
        - "Medium – review within 2 sprints"
        - "Low – defer or monitor"
      default: "Next cycle – defer or monitor"
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Business/User Impact
      description: Who or what is impacted by this change in SERP visibility?
      options:
        - "Org-wide – brand/CTR loss across domains"
        - "Team-wide – feature-level traffic degradation"
        - "Single keyword or page – localized impact"
        - "Unclear – needs investigation"
      default: "Team-wide – feature-level traffic degradation"
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: References & Context
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 🔗 References & Validation  
        Link to GSC, dashboards, or tools that confirm the snippet loss.

  - type: textarea
    id: references
    attributes:
      label: References / Context
      description: Provide links to GSC reports, visual diff tools, SEO dashboards, or exports.
      placeholder: |
        - GSC Performance report  
        - https://search.google.com/test/rich-results  
        - Umami traffic dashboard  
        - Ahrefs visibility history screenshot
    validations:
      required: false

  # --------------------------------------------------------------------
  # SECTION: Attachments
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 📂 Attachments  
        Include screenshots, schema snippets, JSON-LD exports, or SERP snapshots.

  - type: textarea
    id: attachments
    attributes:
      label: Supporting Artifacts
      description: Paste code, screenshots, or logs that support triage of the snippet loss.
      placeholder: |
        ```json
        {
          "@type": "FAQPage",
          "mainEntity": [...]
        }
        ```
    validations:
      required: false

  # --------------------------------------------------------------------
  # SECTION: Confirmation (REQUIRED)
  # --------------------------------------------------------------------
  - type: checkboxes
    id: acknowledgment
    attributes:
      label: Submitter Confirmation
      description: Confirm this report has been validated and contains enough context for SEO action.
      options:
        - label: I confirm this snippet loss is observable, relevant, and internally reviewed.
    validations:
      required: true
