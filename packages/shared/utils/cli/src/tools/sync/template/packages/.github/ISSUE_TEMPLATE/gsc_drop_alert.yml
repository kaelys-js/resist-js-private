# yaml-language-server: $schema=https://json.schemastore.org/github-issue-forms.json

# -------------------------------------------------------------------
# ✅ GitHub Issue Form: GSC Drop Alert
# -------------------------------------------------------------------
# Purpose: Report significant drops in Google Search Console performance data
# (e.g., impressions, clicks, CTR) across pages, queries, or site sections.
# Platform-agnostic, scalable, and SEO-team ready.
# -------------------------------------------------------------------

version: 1.0.0
form_id: gsc-drop-alert

name: "📉 GSC Drop Alert"
description: Alert for significant traffic, click, or impression drops as seen in Google Search Console.
title: "[GSC Drop Alert]: "
labels:
  - seo
  - gsc
  - alert
assignees: []

body:

  # --------------------------------------------------------------------
  # SECTION: Submitter Identity (REQUIRED)
  # --------------------------------------------------------------------
  - type: input
    id: submitted_by
    attributes:
      label: Submitted By
      description: GitHub username or email of the individual submitting the alert.
      placeholder: "@your-username"
      value: "@{{ github.actor }}"
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: GSC Drop Description (REQUIRED)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 📉 GSC Drop Details  
        Describe the change in search performance and provide metrics for analysis.

  - type: textarea
    id: gsc_alert_details
    attributes:
      label: GSC Drop Details
      description: Describe the drop including pages, queries, affected metrics, and time range.
      placeholder: |
        - Affected URL: /docs/api-auth  
        - Query: "OAuth integration"  
        - Impressions: -42% week-over-week  
        - Clicks: -56%, CTR fell from 6.8% → 3.2%  
        - Dates: Drop began around 2025-06-01  
        - Observations: No ranking change, but snippet appearance altered
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: Triage & Impact Assessment (REQUIRED)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 🚦 Triage & Impact  
        Help prioritize investigation based on visibility and potential user/business impact.

  - type: dropdown
    id: severity
    attributes:
      label: Technical Severity
      description: How technically severe is the traffic drop?
      options:
        - "Critical – multiple high-priority queries or templates affected"
        - "High – key URLs or tracked campaigns dropped"
        - "Medium – noticeable but non-blocking traffic loss"
        - "Low – edge case or early signal"
      default: "Medium – noticeable but non-blocking traffic loss"
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      description: How quickly should this be reviewed?
      options:
        - "Critical – must be investigated immediately"
        - "High – review this sprint"
        - "Medium – review within 2 sprints"
        - "Low – monitor over time"
      default: "Next cycle – monitor over time"
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Business/User Impact
      description: What areas are affected by this performance change?
      options:
        - "Org-wide – significant loss of branded/non-branded traffic"
        - "Team-wide – product, support, or marketing exposure"
        - "Single page or user segment – isolated impact"
        - "Unclear – needs validation"
      default: "Team-wide – product, support, or marketing exposure"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority Level
      description: How should this be prioritized in review cycles?
      options:
        - "P0 – top priority"
        - "P1 – high priority"
        - "P2 – normal priority"
        - "P3 – low priority"
      default: "P2 – normal priority"
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: References & Diagnostics (OPTIONAL)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 🔗 References & Diagnostics  
        Link to GSC dashboards, exports, audit snapshots, or deployment logs.

  - type: textarea
    id: references
    attributes:
      label: References / Context
      description: Include relevant links or references to external tools or analysis.
      placeholder: |
        - GSC query performance dashboard  
        - Datastudio or Looker Studio trend view  
        - Related PR: change in meta structure on 2025-05-28  
        - GA4/Umami URL comparison pre/post-drop
    validations:
      required: false

  # --------------------------------------------------------------------
  # SECTION: Attachments (OPTIONAL)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 📂 Attachments  
        Upload GSC exports, screenshots, or plotted trend comparisons.

  - type: textarea
    id: attachments
    attributes:
      label: Supporting Artifacts
      description: Paste structured data, JSON exports, or screenshots of drop indicators.
      placeholder: |
        ```csv
        Date,Impressions,Clicks,CTR,Avg. Position
        2025-05-25, 12,400, 512, 4.1%, 5.2  
        2025-06-01, 7,120, 232, 3.2%, 5.1
        ```
    validations:
      required: false

  # --------------------------------------------------------------------
  # SECTION: Confirmation (REQUIRED)
  # --------------------------------------------------------------------
  - type: checkboxes
    id: acknowledgment
    attributes:
      label: Submitter Confirmation
      description: Confirm the drop has been reviewed and is reproducible via GSC data.
      options:
        - label: I confirm this GSC issue has been validated, is reproducible, and has been reviewed internally.
    validations:
      required: true
