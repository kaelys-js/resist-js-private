# yaml-language-server: $schema=https://json.schemastore.org/github-issue-forms.json

# -------------------------------------------------------------------
# ✅ GitHub Issue Form: SEO Image Alt Text Missing
# -------------------------------------------------------------------
# Purpose: Report missing, duplicate, or non-descriptive alt text
# on images, which may impact SEO, accessibility (WCAG), and UX.
# Designed for broad compatibility across platforms and tools.
# -------------------------------------------------------------------

version: 1.0.0
form_id: seo-image-alt-text-missing

name: "🖼️ SEO Image Alt Text Missing"
description: Report missing, duplicate, or non-descriptive alt text for images.
title: "[SEO Image Alt Text Missing]: "
labels:
  - seo
  - images
  - accessibility
assignees: []

body:

  # --------------------------------------------------------------------
  # SECTION: Submitter Identity (REQUIRED)
  # --------------------------------------------------------------------
  - type: input
    id: submitted_by
    attributes:
      label: Submitted By
      description: GitHub username or email of the individual submitting the issue.
      placeholder: "@your-username"
      value: "@{{ github.actor }}"
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: Image Alt Text Issue (REQUIRED)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 🧾 Image Alt Text Issue  
        Describe where the issue occurs, what type of alt issue it is, and what should be fixed.

  - type: textarea
    id: image_alt_issues
    attributes:
      label: Image Alt Text Issue
      description: List affected URLs or elements and the nature of the issue (missing, duplicate, non-descriptive).
      placeholder: |
        - Page: /products/widget  
        - Image: https://site.com/assets/widget-hero.jpg  
        - Alt: "" (missing)  
        - Expected: "Hero image of Widget Pro 3000"  
        - Additional: 3 other images on the page have the same alt text "product image"
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: Triage & Impact Assessment (REQUIRED)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 🚦 Triage & Impact  
        Help prioritize based on severity, urgency, and scope of the issue.

  - type: dropdown
    id: severity
    attributes:
      label: Technical Severity
      description: How serious is the alt text issue for SEO/accessibility?
      options:
        - "Critical – impacts all key visual content or WCAG compliance"
        - "High – affects major content sections or user flows"
        - "Medium – page-level or secondary images"
        - "Low – minor, decorative images only"
      default: "Medium – page-level or secondary images"
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      description: How quickly should this be resolved?
      options:
        - "Critical – fix immediately"
        - "High – resolve this sprint"
        - "Medium – within next 2 sprints"
        - "Low – backlog candidate"
      default: "Next cycle – backlog candidate"
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Business/User Impact
      description: What is the extent of the issue's effect on users or compliance?
      options:
        - "Org-wide – damages brand or regulatory compliance"
        - "Team-wide – affects product, UX, or marketing goals"
        - "Single user/page – localized issue"
        - "Unclear – needs further validation"
      default: "Team-wide – affects product, UX, or marketing goals"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority Level
      description: How should this be prioritized overall?
      options:
        - "P0 – top priority"
        - "P1 – high priority"
        - "P2 – normal priority"
        - "P3 – low priority"
      default: "P2 – normal priority"
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: References & Context (OPTIONAL)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 🔗 References & Evidence  
        Add crawl exports, audit reports, dashboards, or discussion threads.

  - type: textarea
    id: references
    attributes:
      label: References / Context
      description: Links to audit logs, GSC warnings, crawler exports, or issue discussions.
      placeholder: |
        - Axe-core or Lighthouse audit results  
        - Ahrefs/DeepCrawl missing alt report  
        - Notion backlog for /media asset cleanup  
        - GSC Accessibility Issues: Empty alt attributes flagged
    validations:
      required: false

  # --------------------------------------------------------------------
  # SECTION: Attachments (OPTIONAL)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 📂 Attachments  
        Include screenshots, audit logs, DOM dumps, or markup showing missing or incorrect alt text.

  - type: textarea
    id: attachments
    attributes:
      label: Supporting Artifacts
      description: Paste annotated HTML or screenshots to support triage.
      placeholder: |
        ```html
        <img src="/assets/widget.jpg" alt="">
        <img src="/assets/widget2.jpg" alt="product image">
        ```
    validations:
      required: false

  # --------------------------------------------------------------------
  # SECTION: Confirmation (REQUIRED)
  # --------------------------------------------------------------------
  - type: checkboxes
    id: acknowledgment
    attributes:
      label: Submitter Confirmation
      description: Confirm the issue has been validated and is actionable.
      options:
        - label: I confirm this alt text issue has been validated and requires action.
    validations:
      required: true
