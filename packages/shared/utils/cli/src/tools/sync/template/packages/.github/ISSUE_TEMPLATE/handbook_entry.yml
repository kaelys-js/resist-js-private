# yaml-language-server: $schema=https://json.schemastore.org/github-issue-forms.json

# -------------------------------------------------------------------
# ✅ GitHub Issue Form: Handbook Entry Request
# -------------------------------------------------------------------
# Purpose: Propose a new handbook entry or request an update to an existing one,
# covering process, team documentation, policies, or operational guidance.
# Tool-agnostic and enterprise-aligned.
# -------------------------------------------------------------------

version: 1.0.0
form_id: handbook-entry-request

name: "📘 Handbook Entry Request"
description: Propose a new or updated handbook entry (policy, workflow, onboarding, doc structure, etc).
title: "[Handbook Entry]: "
labels:
  - handbook
  - documentation
assignees: []

body:

  # --------------------------------------------------------------------
  # SECTION: Submitter Identity (REQUIRED)
  # --------------------------------------------------------------------
  - type: input
    id: submitted_by
    attributes:
      label: Submitted By
      description: GitHub username or email of the person submitting this request.
      placeholder: "@your-username"
      value: "@{{ github.actor }}"
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: Proposed Handbook Entry (REQUIRED)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 📝 Proposed Entry  
        Describe the topic of the handbook entry and the reason for the request.

  - type: textarea
    id: entry_proposal
    attributes:
      label: Proposed Entry
      description: Include the entry title, overview, section it belongs to, and any relevant draft content.
      placeholder: |
        - Title: Internal Onboarding for Engineers  
        - Section: handbook/onboarding/engineering.md  
        - Summary: Add updated onboarding checklist for infra team  
        - Content: Steps to get access to Sentry, Argo, Umami, GCP  
        - Rationale: Original doc is outdated, doesn't include Stripe/biome/tools
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: Triage & Scope (REQUIRED)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 🚦 Triage & Scope  
        Estimate the importance, reach, and recency requirement of the entry.

  - type: dropdown
    id: severity
    attributes:
      label: Documentation Severity
      description: How inaccurate, incomplete, or outdated is the existing documentation?
      options:
        - "Critical – missing entirely or dangerously outdated"
        - "High – significant change needed for clarity or correctness"
        - "Medium – requires content improvement or expansion"
        - "Low – cosmetic, formatting, or copy-level issue"
      default: "Medium – requires content improvement or expansion"
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      description: How soon does this entry need to be added or updated?
      options:
        - "Critical – must be in before launch or compliance deadline"
        - "High – needed this sprint"
        - "Medium – next 2 sprints"
        - "Low – backlog item"
      default: "Next cycle – next 2 sprints"
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Organizational Impact
      description: What scope of teams or workflows does this affect?
      options:
        - "Org-wide – affects onboarding, trust, or cross-team coordination"
        - "Team-wide – relevant to one department or product surface"
        - "Single contributor – niche or infrequent need"
        - "Unclear – needs validation"
      default: "Team-wide – relevant to one department or product surface"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority Level
      description: How should this be prioritized relative to other documentation work?
      options:
        - "P0 – top priority"
        - "P1 – high priority"
        - "P2 – normal priority"
        - "P3 – low priority"
      default: "P2 – normal priority"
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: References & Background (OPTIONAL)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 🔗 References & Context  
        Add links to Notion, internal documents, decision logs, or Slack threads related to this request.

  - type: textarea
    id: references
    attributes:
      label: References / Context
      description: Include links to background documentation, prior discussions, or outdated sources.
      placeholder: |
        - Original doc: handbook/onboarding/engineering.md  
        - Slack thread: #engineering > pinned messages  
        - Docs request: PR #1221 removed outdated steps for biome setup  
        - Internal doc: Notion > Engineering > Access Checklist
    validations:
      required: false

  # --------------------------------------------------------------------
  # SECTION: Attachments (OPTIONAL)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 📂 Attachments  
        Include screenshots, draft markdown, diagrams, or table content.

  - type: textarea
    id: attachments
    attributes:
      label: Supporting Artifacts
      description: Paste or link to any content you want included, such as Markdown, Notion exports, or screenshots.
      placeholder: |
        ```md
        ## Access Checklist  
        - [ ] Request access to Sentry  
        - [ ] Connect GCP key via internal CLI  
        - [ ] Setup Stripe test mode in sandbox
        ```
    validations:
      required: false

  # --------------------------------------------------------------------
  # SECTION: Confirmation (REQUIRED)
  # --------------------------------------------------------------------
  - type: checkboxes
    id: acknowledgment
    attributes:
      label: Submitter Confirmation
      description: Confirm the entry is complete, reviewed, and ready to be triaged.
      options:
        - label: I confirm this handbook entry request is valid, reviewed, and actionable.
    validations:
      required: true
