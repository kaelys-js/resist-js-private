# yaml-language-server: $schema=https://json.schemastore.org/github-issue-forms.json

# -------------------------------------------------------------------
# ✅ GitHub Issue Form: Enablement Request
# -------------------------------------------------------------------
# Purpose: Request access to a tool, process, or service for users, teams, or environments.
# Built to handle onboarding, service account setup, environment access, or CI/CD pipeline enablement.
# Fully stack-agnostic and schema-compliant.
# -------------------------------------------------------------------

version: 1.0.0
form_id: enablement-request

name: "🛠️ Enablement Request"
description: Request enablement for tooling, service, or process for an individual, team, or environment.
title: "[Enablement Request]: "
labels:
  - enablement
  - request
assignees: []

body:

  # --------------------------------------------------------------------
  # SECTION: Submitter Identity (REQUIRED)
  # --------------------------------------------------------------------
  - type: input
    id: submitted_by
    attributes:
      label: Submitted By
      description: GitHub username or email of the person submitting the request.
      placeholder: "@your-username"
      value: "@{{ github.actor }}"
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: Enablement Details (REQUIRED)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## ⚙️ Enablement Details  
        Describe the system, tool, or integration being requested and who/what needs access.

  - type: textarea
    id: enablement_details
    attributes:
      label: Enablement Details
      description: Include the tool, service, or capability requested, and the use case or scope of enablement.
      placeholder: |
        - Tool: ArgoCD  
        - Access: DevOps team, staging environment  
        - Purpose: Grant deployment control for staging services via UI  
        - Existing setup: Read-only enabled via K8s RBAC  
        - Request: Enable write access with audit logging enabled
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: Triage & Impact Assessment (REQUIRED)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 🚦 Triage & Impact  
        Assess the business value and urgency of the enablement request.

  - type: dropdown
    id: severity
    attributes:
      label: Functional Severity
      description: How much functionality is blocked or limited by this missing enablement?
      options:
        - "Critical – blocks deployment, onboarding, or core delivery"
        - "High – blocks daily work for multiple contributors"
        - "Medium – partial disruption or degraded UX"
        - "Low – advisory or convenience request"
      default: "Medium – partial disruption or degraded UX"
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      description: How soon does this need to be resolved?
      options:
        - "Critical – needed immediately"
        - "High – unblock this sprint"
        - "Medium – resolve in next 2 sprints"
        - "Low – add to enablement backlog"
      default: "Next cycle – resolve in next 2 sprints"
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Scope of Impact
      description: Who or what is affected by this enablement gap?
      options:
        - "Org-wide – cross-functional teams or critical infra"
        - "Team-wide – one department, environment, or workflow"
        - "Single user – individual or ephemeral access need"
        - "Unclear – needs clarification"
      default: "Team-wide – one department, environment, or workflow"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority Level
      description: Assign a priority based on urgency, impact, and workstream alignment.
      options:
        - "P0 – top priority"
        - "P1 – high priority"
        - "P2 – normal priority"
        - "P3 – low priority"
      default: "P2 – normal priority"
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: References & Context (OPTIONAL)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 🔗 References & Context  
        Provide supporting context like policies, existing permissions, Slack threads, etc.

  - type: textarea
    id: references
    attributes:
      label: References / Context
      description: Add links to PRs, RBAC configs, access policies, previous approvals, or internal docs.
      placeholder: |
        - PR #332 updated Argo AppProject role but omitted staging  
        - Onboarding doc: DevOps staging access request  
        - Notion doc: Platform rollout matrix Q3  
        - Related request: #1145 for GCP access in same group
    validations:
      required: false

  # --------------------------------------------------------------------
  # SECTION: Attachments (OPTIONAL)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 📂 Attachments  
        Include screenshots, logs, config snippets, or policy diffs.

  - type: textarea
    id: attachments
    attributes:
      label: Supporting Artifacts
      description: Paste relevant diffs, screenshots, CLI output, or permission maps.
      placeholder: |
        ```yaml
        apiVersion: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        metadata:
          name: devops-staging-access
        roleRef:
          kind: Role
          name: deployer
          apiGroup: rbac.authorization.k8s.io
        subjects:
        - kind: Group
          name: devops
          apiGroup: rbac.authorization.k8s.io
        ```
    validations:
      required: false

  # --------------------------------------------------------------------
  # SECTION: Confirmation (REQUIRED)
  # --------------------------------------------------------------------
  - type: checkboxes
    id: acknowledgment
    attributes:
      label: Submitter Confirmation
      description: Confirm the request is valid, internally aligned, and ready for triage.
      options:
        - label: I confirm this enablement request is complete, reviewed, and ready for processing.
    validations:
      required: true
