# yaml-language-server: $schema=https://json.schemastore.org/github-issue-forms.json

version: 1.0.0
form_id: secrets-rotation-request

name: "🔒 Secrets Rotation Request"
description: Request key or credential rotation.
title: "[Secrets Rotation]: "
labels:
  - security
  - secrets
assignees: []

body:

  # --------------------------------------------------------------------
  # SECTION: Submitter Identity
  # --------------------------------------------------------------------
  - type: input
    id: submitted_by
    attributes:
      label: Submitted By
      placeholder: "@your-username"
      value: "@{{ github.actor }}"
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: Secret Metadata
  # --------------------------------------------------------------------
  - type: input
    id: secret_name
    attributes:
      label: Secret or Credential Name
      placeholder: "e.g., STRIPE_WEBHOOK_SECRET"

  - type: textarea
    id: reason
    attributes:
      label: Reason for Rotation
      description: Why is this secret being rotated?
      placeholder: |
        - Approaching expiration  
        - Rotating after third-party onboarding  
        - Scheduled rotation per policy  
        - Detected via audit or tooling
      render: markdown
    validations:
      required: true

  - type: input
    id: expiry
    attributes:
      label: Expiration Date (if known)
      placeholder: "e.g., 2025-12-31"

  # --------------------------------------------------------------------
  # SECTION: Operational Triage (OPTIONAL)
  # --------------------------------------------------------------------
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How critical is this rotation?
      options:
        - Critical – exposed or revoked secret
        - High – time-sensitive or policy-required
        - Medium – internal system access
        - Low – planned or proactive rotation
      default: Medium – internal system access
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      description: When should this be completed?
      options:
        - Immediate – same day
        - Soon – within 3 days
        - Next sprint – during regular cadence
        - Not urgent
      default: Soon – within 3 days
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      description: What systems or teams are affected?
      options:
        - Org-wide
        - Multiple teams
        - Single team
        - Low/no impact
      default: Single team
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Suggested priority level for handling this request.
      options:
        - P0 – immediate action
        - P1 – next available cycle
        - P2 – can be queued
        - P3 – backlog or batch rotation
      default: P1 – next available cycle
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: References and Compliance Context
  # --------------------------------------------------------------------
  - type: input
    id: references
    attributes:
      label: Links to Secret Manager, Vault, or Ticket
      placeholder: "e.g., HashiCorp Vault path, GCP Secret Manager link, audit ref"

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Include affected services, rotation instructions, notes for approvers.
      placeholder: |
        - Stored in GCP Secret Manager with auto-rotation enabled  
        - Used by `payments` service in `prod`  
        - Notify @secops before rotation

  # --------------------------------------------------------------------
  # SECTION: Confirmation
  # --------------------------------------------------------------------
  - type: checkboxes
    id: acknowledgment
    attributes:
      label: Confirmation
      description: Confirm readiness and security implications.
      options:
        - label: I confirm this secret is in use and rotation is justified
        - label: I’ve reviewed escalation or approval policies internally
    validations:
      required: true
