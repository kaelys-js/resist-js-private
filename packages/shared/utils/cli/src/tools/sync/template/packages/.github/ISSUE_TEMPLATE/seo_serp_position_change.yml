# yaml-language-server: $schema=https://json.schemastore.org/github-issue-forms.json

# -------------------------------------------------------------------
# ✅ GitHub Issue Form: SEO SERP Position Change
# -------------------------------------------------------------------
# Purpose: Track significant changes in search engine result page (SERP)
# rankings for priority keywords or landing pages.
# Built for platform-agnostic, enterprise-scale SEO tracking workflows.
# -------------------------------------------------------------------

version: 1.0.0
form_id: seo-serp-position-change

name: "📉 SEO SERP Position Change"
description: Track significant SERP rank changes for key pages or keywords.
title: "[SEO SERP Position Change]: "
labels:
  - seo
  - serp
  - rankings
assignees: []

body:

  # --------------------------------------------------------------------
  # SECTION: Submitter Identity (REQUIRED)
  # --------------------------------------------------------------------
  - type: input
    id: submitted_by
    attributes:
      label: Submitted By
      description: GitHub username or contact of the person submitting this issue.
      placeholder: "@your-username"
      value: "@{{ github.actor }}"
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: SERP Position Change Description (REQUIRED)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 🔍 SERP Position Change  
        Describe the keyword, ranking change, and any visible impact.

  - type: textarea
    id: serp_position_change
    attributes:
      label: SERP Position Change
      description: Provide detail on affected keywords or pages and any suspected cause.
      placeholder: |
        - Keyword: "biome platform"  
        - Old rank: 3  
        - New rank: 8  
        - URL: /platform/overview  
        - Suspected reason: competitor page update, internal link drop, Google update on June 2
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: Triage & Impact Assessment (REQUIRED)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 🚦 Triage & Impact  
        Help assess how serious and urgent this rank shift is.

  - type: dropdown
    id: priority
    attributes:
      label: Priority Level
      description: How should this change be prioritized in the SEO backlog?
      options:
        - "P0 – top priority"
        - "P1 – high priority"
        - "P2 – normal priority"
        - "P3 – low priority"
      default: "P2 – normal priority"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Technical Severity
      description: What is the scale of technical or algorithmic impact behind this ranking change?
      options:
        - "Critical – core pages or money terms dropped"
        - "High – primary terms shifted significantly"
        - "Medium – secondary keywords moved down"
        - "Low – low-traffic keywords affected"
      default: "Medium – secondary keywords moved down"
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      description: How soon should this issue be triaged?
      options:
        - "Critical – act immediately"
        - "High – resolve this sprint"
        - "Medium – review within 2 sprints"
        - "Low – monitor"
      default: "Next cycle – monitor"
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Business/User Impact
      description: What business area or traffic flow is affected?
      options:
        - "Org-wide – cross-domain or strategic traffic affected"
        - "Team-wide – key campaign, product, or market affected"
        - "Single URL or query – localized impact"
        - "Unclear – needs further validation"
      default: "Team-wide – key campaign, product, or market affected"
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: References & Supporting Sources
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 🔗 References & Evidence  
        Add links to GSC, rank trackers, dashboards, or traffic analytics.

  - type: textarea
    id: references
    attributes:
      label: References / Context
      description: URLs or dashboards that show rank trends or support your observations.
      placeholder: |
        - GSC Performance report for /platform/overview  
        - Ahrefs keyword movement graph  
        - Internal keyword tracking spreadsheet  
        - SERP screenshot from June 2
    validations:
      required: false

  # --------------------------------------------------------------------
  # SECTION: Attachments
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 📂 Attachments  
        Include logs, CSVs, SERP diffs, or visibility tracking exports.

  - type: textarea
    id: attachments
    attributes:
      label: Supporting Artifacts
      description: Paste or link any screenshots, audit logs, or exports supporting the rank change.
      placeholder: |
        ```csv
        Keyword,Old Rank,New Rank,URL
        biome platform,3,8,/platform/overview
        ```
    validations:
      required: false

  # --------------------------------------------------------------------
  # SECTION: Confirmation (REQUIRED)
  # --------------------------------------------------------------------
  - type: checkboxes
    id: acknowledgment
    attributes:
      label: Submitter Confirmation
      description: Confirm that the rank change has been reviewed and is ready for triage.
      options:
        - label: I confirm this rank shift is observable, reproducible, and internally validated.
    validations:
      required: true
