# yaml-language-server: $schema=https://json.schemastore.org/github-issue-forms.json

# -------------------------------------------------------------------
# ✅ GitHub Issue Form: SEO Brand vs Competitor SERP Encroachment
# -------------------------------------------------------------------
# Purpose: Document and triage instances where branded search terms are overtaken
# by competitors in the search engine results pages (SERPs).
# Structured to support enterprise SEO triage and mitigation planning.
# -------------------------------------------------------------------

version: 1.0.0
form_id: seo-brand-serp-encroachment

name: "🏷️ SEO Brand vs Competitor SERP Encroachment"
description: Monitor and flag competitor encroachment into branded keyword space on SERPs.
title: "[SEO Brand vs Competitor SERP]: "
labels:
  - seo
  - brand
  - competitor
  - serp
assignees: []

body:

  # --------------------------------------------------------------------
  # SECTION: Submitter Identity (REQUIRED)
  # --------------------------------------------------------------------
  - type: input
    id: submitted_by
    attributes:
      label: Submitted By
      description: GitHub username or email of the individual submitting the report.
      placeholder: "@your-username"
      value: "@{{ github.actor }}"
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: Encroachment Description (REQUIRED)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 🔍 SERP Brand Encroachment  
        Describe how a competitor has started ranking for a branded keyword or phrase.

  - type: textarea
    id: brand_competitor_encroachment
    attributes:
      label: SERP Brand Encroachment
      description: Explain what keyword is affected, which competitor is ranking, and any known context.
      placeholder: |
        - Keyword: "YourBrand pricing"  
        - Competitor: rivaldomain.com  
        - Rank change: moved from position 2 to 5  
        - Suspected cause: competitor launched a comparison landing page
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: Triage & Impact Assessment (REQUIRED)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 🚦 Triage & Impact  
        Help assess urgency, scope, and severity of the brand SERP displacement.

  - type: dropdown
    id: priority
    attributes:
      label: Priority Level
      description: How important is resolving this encroachment?
      options:
        - "P0 – top priority"
        - "P1 – high priority"
        - "P2 – normal priority"
        - "P3 – low priority"
      default: "P2 – normal priority"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Technical Severity
      description: How significant is this ranking shift from an SEO and brand trust perspective?
      options:
        - "Critical – competitor dominates multiple branded queries"
        - "High – important terms impacted with traffic loss"
        - "Medium – limited scope or partial ranking drops"
        - "Low – minor or temporary shift"
      default: "Medium – limited scope or partial ranking drops"
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      description: How soon should this SERP issue be addressed?
      options:
        - "Critical – immediate action needed"
        - "High – resolve this sprint"
        - "Medium – review within 2 sprints"
        - "Low – monitor for changes"
      default: "Next cycle – monitor for changes"
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Business/User Impact
      description: Who or what is affected by this SERP shift?
      options:
        - "Org-wide – brand perception and conversion impacted"
        - "Team-wide – key products or pages displaced"
        - "Single user/query – low visibility concern"
        - "Unclear – requires more data"
      default: "Team-wide – key products or pages displaced"
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: References & Diagnostic Evidence
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 🔗 References & Evidence  
        Include links to SERP snapshots, dashboards, rank tracking tools, or keyword audits.

  - type: textarea
    id: references
    attributes:
      label: References / Context
      description: Share rank tracking links, audit reports, screenshots, or exports.
      placeholder: |
        - Ahrefs or Semrush keyword trend  
        - Search Console performance report  
        - Screenshot of SERP for "YourBrand vs CompetitorX"  
        - Keyword cannibalization audit
    validations:
      required: false

  # --------------------------------------------------------------------
  # SECTION: Attachments
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 📂 Attachments  
        Upload screenshots, CSV exports, or keyword tracking logs.

  - type: textarea
    id: attachments
    attributes:
      label: Supporting Artifacts
      description: Paste or link to any relevant structured data or visual evidence.
      placeholder: |
        ```csv
        Keyword,Your Rank,Competitor Rank,Date
        yourbrand software,3,1,2025-06-02
        ```
    validations:
      required: false

  # --------------------------------------------------------------------
  # SECTION: Confirmation (REQUIRED)
  # --------------------------------------------------------------------
  - type: checkboxes
    id: acknowledgment
    attributes:
      label: Submitter Confirmation
      description: Confirm this report has been reviewed and contains actionable insights.
      options:
        - label: I confirm this encroachment has been reviewed and reflects a valid competitor ranking shift.
    validations:
      required: true
