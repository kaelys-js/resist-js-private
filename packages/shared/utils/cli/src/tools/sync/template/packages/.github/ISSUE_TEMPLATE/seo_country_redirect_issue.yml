# yaml-language-server: $schema=https://json.schemastore.org/github-issue-forms.json

# -------------------------------------------------------------------
# ✅ GitHub Issue Form: SEO Country Redirect Issue
# -------------------------------------------------------------------
# Purpose: Document problematic geo-based redirect behavior that may violate SEO best practices
# (e.g. automatic redirects based on IP, incorrect hreflang targeting, or content inaccessibility).
# Compatible with enterprise-scale SEO and internationalization workflows.
# -------------------------------------------------------------------

version: 1.0.0
form_id: seo-country-redirect-issue

name: "🌍 SEO Country Redirect Issue"
description: Report country- or region-based redirects that violate SEO or internationalization best practices.
title: "[SEO Country Redirect Issue]: "
labels:
  - seo
  - hreflang
  - international
assignees: []

body:

  # --------------------------------------------------------------------
  # SECTION: Submitter Identity (REQUIRED)
  # --------------------------------------------------------------------
  - type: input
    id: submitted_by
    attributes:
      label: Submitted By
      description: GitHub username or email of the individual submitting the report.
      placeholder: "@your-username"
      value: "@{{ github.actor }}"
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: Country Redirect Description (REQUIRED)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 🚧 Country Redirect Behavior  
        Describe how the site is redirecting users based on location or language and why it's problematic.

  - type: textarea
    id: country_redirect_details
    attributes:
      label: Country Redirect Behavior
      description: Detail the issue including redirect logic, affected countries, expected vs actual behavior.
      placeholder: |
        - Source Country: Germany  
        - Visited: /en-us/pricing → Redirected to /de-de/home  
        - Expected: Remain on requested page or offer language switch  
        - Issue: Prevents access to original content and breaks Googlebot crawling
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: Triage & Impact (REQUIRED)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 🚦 Triage & Impact  
        Help us evaluate the urgency, scope, and impact on SEO and UX.

  - type: dropdown
    id: severity
    attributes:
      label: Technical Severity
      description: How technically severe is the redirect behavior?
      options:
        - "Critical – prevents crawling or indexing"
        - "High – affects major traffic regions or pages"
        - "Medium – isolated to a few regions or flows"
        - "Low – UX annoyance, but not SEO-breaking"
      default: "Medium – isolated to a few regions or flows"
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      description: How quickly should this issue be addressed?
      options:
        - "Critical – needs immediate resolution"
        - "High – resolve this sprint"
        - "Medium – next 2 sprints"
        - "Low – backlog candidate"
      default: "Next cycle – backlog candidate"
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Business/User Impact
      description: Who or what is impacted by the redirect behavior?
      options:
        - "Org-wide – affects global SEO performance"
        - "Team-wide – impacts regional content or performance"
        - "Single user or region – localized access issue"
        - "Unclear – requires further investigation"
      default: "Team-wide – impacts regional content or performance"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority Level
      description: How should this be prioritized in the issue backlog?
      options:
        - "P0 – top priority"
        - "P1 – high priority"
        - "P2 – normal priority"
        - "P3 – low priority"
      default: "P2 – normal priority"
    validations:
      required: true

  # --------------------------------------------------------------------
  # SECTION: References & Context (OPTIONAL)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 🔗 References & Evidence  
        Provide diagnostics, crawler behavior, audit tools, or documentation of redirect behavior.

  - type: textarea
    id: references
    attributes:
      label: References / Context
      description: Links to relevant tools, PRs, issues, or dashboards that support the report.
      placeholder: |
        - Lighthouse test showing 302 redirect  
        - https://developers.google.com/search/docs/advanced/crawling/ip-location  
        - Screaming Frog export of redirect chains  
        - GSC Crawl Stats showing drop in indexed /en-us URLs
    validations:
      required: false

  # --------------------------------------------------------------------
  # SECTION: Attachments (OPTIONAL)
  # --------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ## 📂 Attachments  
        Include redirect headers, logs, screenshots, or export files.

  - type: textarea
    id: attachments
    attributes:
      label: Supporting Artifacts
      description: Paste request/response headers, redirect chains, or audit results.
      placeholder: |
        ```http
        GET /en-us/pricing
        302 Found → Location: /de-de/home
        User-Agent: Googlebot
        ```
    validations:
      required: false

  # --------------------------------------------------------------------
  # SECTION: Confirmation (REQUIRED)
  # --------------------------------------------------------------------
  - type: checkboxes
    id: acknowledgment
    attributes:
      label: Submitter Confirmation
      description: Confirm internal validation has occurred and this issue is ready for triage.
      options:
        - label: I confirm this redirect issue is reproducible and violates SEO best practices.
    validations:
      required: true
