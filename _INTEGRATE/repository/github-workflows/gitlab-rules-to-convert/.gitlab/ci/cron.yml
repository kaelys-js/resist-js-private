# yaml-language-server: $schema=https://gitlab.com/gitlab-org/gitlab/-/raw/master/app/assets/javascripts/editor/schema/ci.json

stages:
  - notify
  - audit
  - lint
  - cleanup
  - metrics

remind:stale-mrs:
  stage: notify
  script: ./scripts/ci/remind-stale-mrs.sh
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  tags: [cron]

remind:unassigned-mrs:
  stage: notify
  script: ./scripts/ci/remind-unassigned-mrs.sh
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
