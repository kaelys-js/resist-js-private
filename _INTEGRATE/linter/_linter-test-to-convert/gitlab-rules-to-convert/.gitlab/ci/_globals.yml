# yaml-language-server: $schema=https://gitlab.com/gitlab-org/gitlab/-/raw/master/app/assets/javascripts/editor/schema/ci.json

# ------------------------------------------------------------------------------
# ⚙️ Default CI/CD Variables
# ------------------------------------------------------------------------------
# These are project-wide default values injected into all jobs.
# They define the active database and Wrangler environment used during CI.
#
# These defaults are overridden by GitLab CI/CD scoped variables per branch:
# - On `main` / `master`:    DB_NAME=analytics_prod, WRANGLER_ENV=production
# - On `staging`:            DB_NAME=analytics_staging, WRANGLER_ENV=staging
# - On `feature/*`:          Handled dynamically via preview bootstrap logic
#
# These variables control:
# - Which D1 database is targeted by migrations and deploys
# - Which Wrangler environment config is used during `wrangler deploy`
variables:
  DB_NAME: "analytics_staging"
  WRANGLER_ENV: "staging"

# ------------------------------------------------------------------------------
# 🧰 CI Runtime Environment & Bootstrap Setup
# ------------------------------------------------------------------------------
# Uses the official Volta Docker image to control Node + pnpm versions.
# Volta ensures reproducible toolchain setup across all CI jobs.
#
# before_script is executed before every job and performs:
# - Toolchain setup (installs Node and pnpm via Volta)
# - Prints Node and pnpm versions for audit/debug
# - Installs project dependencies (respects lockfile)
# - Loads environment-specific `.env.${WRANGLER_ENV}` if present
#
# ⚠️ If `.env.${WRANGLER_ENV}` is missing, a warning is logged but execution continues.
# This file is typically generated by bootstrap:* jobs or defined manually per environment.
image: volta-cli/volta:latest

# ------------------------------------------------------------------------------
# 🧪 setup:check-env — Initial CI environment validation job
# ------------------------------------------------------------------------------
# This job runs early in the pipeline (stage: setup) to validate that the current
# CI context is properly configured before continuing to lint, test, build, or deploy.
#
# ✅ Responsibilities:
#   - Logs current CI state for debugging and traceability
#   - Ensures Node + pnpm are installed and working via Volta
#   - Loads `.env.${WRANGLER_ENV}` (e.g., staging, production, preview)
#   - Validates all required CI/CD variables and secrets are present
#
# 🧠 This job is designed to:
#   - Fail fast if anything critical is missing or misconfigured
#   - Skip repeated validation in downstream jobs (they assume env is ready)
#   - Establish trust in the CI context before continuing
#
# ✅ `run_ci_environment_checks` includes:
#   - `bootstrap_node_toolchain` (Volta + pnpm setup)
#   - `check_required_secrets` (e.g. SENTRY_DSN, SENTRY_PROJECT)
#   - `validate_required_ci_vars` (e.g. WRANGLER_ENV, DB_NAME, SERVICE_NAME)
#
# ⚠️ Downstream jobs should not duplicate these checks — this is the single gate.
setup:check-env:
  stage: setup
  script:
    - log_ci_context
    - bootstrap_node_toolchain
    - run_ci_environment_checks
    - validate_required_ci_vars
    - validate_wrangler_env_config
    - load_env_file

# ------------------------------------------------------------------------------
# 🔁 Global Job Bootstrap — source common CI functions
# ------------------------------------------------------------------------------
# This line ensures every job has access to shared utility functions defined in:
#   → $CI_PROJECT_DIR/packages/shared/scripts/common.sh
#
# These functions include:
# - log_ci_context                 → logs branch, commit, pipeline metadata
# - bootstrap_node_toolchain      → installs Node & pnpm via Volta
# - load_env_file                 → loads .env.${WRANGLER_ENV} if present
# - validate_required_ci_vars     → validates essential CI/CD pipeline variables
# - check_required_secrets        → validates secrets for wrangler secret sync
# - deploy/teardown/monitor utils → used across deploy, preview, rollback stages
#
# ✅ Every job will inherit this unless explicitly overridden.
# ✅ This file must be kept fast, safe, and side-effect-free at load time.
before_script:
  - source "$CI_PROJECT_DIR/packages/shared/scripts/ci/common.sh"