# Taplo TOML Linter Configuration
# https://taplo.tamasfe.dev/configuration/
# This config is for LINTING (validation) - see formatter-test/config for formatting

[schema]
# Enable schema validation
enabled = true

# Use schema catalog for known TOML files
catalog = true

[[rule]]
# All TOML files - validation rules
include = ["**/*.toml"]
exclude = [
	"node_modules/**",
	"dist/**",
	"build/**",
	".svelte-kit/**",
	"target/**",
	"vendor/**"
]

[[rule]]
# Cargo.toml - use Cargo schema for validation
include = ["**/Cargo.toml"]

[rule.schema]
url = "https://json.schemastore.org/cargo.json"

[[rule]]
# pyproject.toml - use pyproject schema
include = ["**/pyproject.toml"]

[rule.schema]
url = "https://json.schemastore.org/pyproject.json"

[[rule]]
# netlify.toml
include = ["**/netlify.toml"]

[rule.schema]
url = "https://json.schemastore.org/netlify.json"

[[rule]]
# wrangler.toml (Cloudflare Workers)
include = ["**/wrangler.toml"]

[rule.schema]
url = "https://json.schemastore.org/wrangler.json"

[[rule]]
# turbo.json related TOML
include = ["**/turbo.toml"]

[rule.schema]
url = "https://turbo.build/schema.json"

[[rule]]
# biome.toml
include = ["**/biome.toml"]

[rule.schema]
url = "https://biomejs.dev/schemas/1.9.0/schema.json"
