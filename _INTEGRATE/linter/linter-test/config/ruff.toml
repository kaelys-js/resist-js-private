# Ruff Python Linter Configuration
# https://docs.astral.sh/ruff/configuration/
# This config is for LINTING only - see formatter-test/config for formatting

# Target Python version
target-version = "py311"

# Line length (for wrapping checks)
line-length = 100

# Output format
output-format = "grouped"

# Exclude common directories
exclude = [
	".bzr",
	".direnv",
	".eggs",
	".git",
	".git-rewrite",
	".hg",
	".ipynb_checkpoints",
	".mypy_cache",
	".nox",
	".pants.d",
	".pyenv",
	".pytest_cache",
	".pytype",
	".ruff_cache",
	".svn",
	".tox",
	".venv",
	".vscode",
	"__pypackages__",
	"_build",
	"buck-out",
	"build",
	"dist",
	"node_modules",
	"site-packages",
	"venv",
]

# Don't auto-fix in linter mode (use formatter for that)
fix = false

# Show what would be fixed
show-fixes = true

[lint]
# Enable these rule sets
select = [
	"E",      # pycodestyle errors
	"W",      # pycodestyle warnings
	"F",      # Pyflakes
	"I",      # isort
	"B",      # flake8-bugbear
	"C4",     # flake8-comprehensions
	"UP",     # pyupgrade
	"ARG",    # flake8-unused-arguments
	"SIM",    # flake8-simplify
	"TCH",    # flake8-type-checking
	"PTH",    # flake8-use-pathlib
	"ERA",    # eradicate (commented-out code)
	"PL",     # Pylint
	"RUF",    # Ruff-specific rules
	"PERF",   # Perflint
	"FURB",   # refurb
	"S",      # flake8-bandit (security)
	"N",      # pep8-naming
]

# Ignore these specific rules
ignore = [
	"E501",   # line too long (handled by formatter)
	"B008",   # function calls in argument defaults
	"PLR0913", # too many arguments
	"PLR2004", # magic value comparison
]

# Allow unused variables when underscore-prefixed
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

# Allow autofix for all enabled rules (when --fix is used)
fixable = ["ALL"]
unfixable = []

[lint.per-file-ignores]
# Ignore import violations in __init__.py
"__init__.py" = ["F401", "F403"]
# Ignore unused arguments in test files
"test_*.py" = ["ARG", "S101"]
"*_test.py" = ["ARG", "S101"]
# Ignore security checks in scripts
"scripts/**" = ["S"]

[lint.isort]
# Force single line imports
force-single-line = false
# Lines between import sections
lines-between-types = 1
# Combine as imports on same line
combine-as-imports = true
# Split imports by type
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]

[lint.flake8-bugbear]
# Allow default mutable arguments for common patterns
extend-immutable-calls = ["fastapi.Depends", "fastapi.Query", "fastapi.Path"]

[lint.pylint]
# Maximum number of branches
max-branches = 12
# Maximum number of returns
max-returns = 6
# Maximum number of statements
max-statements = 50

[lint.flake8-bandit]
# Security hardening
check-typed-exception = true
