# actionlint configuration
# https://github.com/rhysd/actionlint

# Self-hosted runners configuration
self-hosted-runner:
  # Labels for self-hosted runners
  labels:
    - ubuntu-latest
    - macos-latest
    - windows-latest
    - self-hosted
    - linux
    - x64
    - arm64

# Configuration variables available in workflows
config-variables:
  - CLOUDFLARE_ACCOUNT_ID
  - TURBO_TEAM
  - TURBO_TOKEN

# Path filters
paths:
  ignore: []

# Workflow dispatch inputs (expected input names)
# dispatch-inputs: []
