# Hadolint Dockerfile linter configuration
# https://github.com/hadolint/hadolint

# Globally ignore these rules
ignored:
  # - DL3008  # Pin versions in apt-get install
  # - DL3018  # Pin versions in apk add

# Treat these rules as errors (default: warning)
failure-threshold: warning

# Treat these rules as style issues (default: info)
# style:
#   - DL3015

# Override shell for RUN instructions
override:
  # Specify a shell to use for RUN
  # shell: /bin/bash

# Set label schema
label-schema:
  maintainer: text
  org.opencontainers.image.authors: text
  org.opencontainers.image.created: rfc3339
  org.opencontainers.image.description: text
  org.opencontainers.image.documentation: url
  org.opencontainers.image.licenses: spdx
  org.opencontainers.image.ref.name: text
  org.opencontainers.image.revision: hash
  org.opencontainers.image.source: url
  org.opencontainers.image.title: text
  org.opencontainers.image.url: url
  org.opencontainers.image.vendor: text
  org.opencontainers.image.version: semver

# Strict label checking
strict-labels: false

# Disable color output
no-color: false

# Disable version check in output
no-fail: false

# Trusted registries for FROM
trustedRegistries:
  - docker.io
  - gcr.io
  - ghcr.io
  - quay.io
  - registry.access.redhat.com
  - public.ecr.aws
