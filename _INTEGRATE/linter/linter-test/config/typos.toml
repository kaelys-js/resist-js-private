# Typos configuration
# https://github.com/crate-ci/typos

[default]
# Check file names
check-filename = true
# Check file contents
check-file = true
# Use Unicode character detection
unicode = true

[default.extend-identifiers]
# Add words that should be considered valid identifiers
# (variable names, function names, etc.)

[default.extend-words]
# Add words that should be considered valid in text
# Format: "typo" = "correction" or "typo" = false to ignore
agan = "again"
ot = "to"

# Common programming terms that aren't typos
# These are often flagged incorrectly
[default.extend-ignore-identifiers-re]
# Regex patterns for identifiers to ignore

[default.extend-ignore-words-re]
# Regex patterns for words to ignore

[files]
# Paths to ignore
extend-exclude = [
    "*.lock",
    "*.min.js",
    "*.min.css",
    "*.bundle.js",
    "*.bundle.css",
    "node_modules/",
    ".git/",
    "dist/",
    "build/",
    ".svelte-kit/",
    "coverage/",
    "target/",
    "vendor/",
    "*.snap",
    "pnpm-lock.yaml",
    "package-lock.json",
    "yarn.lock",
    "Cargo.lock",
    "poetry.lock",
]

# File types to ignore
ignore-hidden = true
ignore-files = false
ignore-dot = false
ignore-vcs = true
ignore-global = true
ignore-parent = true

[type.css]
# CSS-specific settings
extend-glob = ["*.css", "*.scss", "*.sass", "*.less"]
check-file = true

[type.html]
# HTML-specific settings
extend-glob = ["*.html", "*.htm", "*.svelte", "*.vue", "*.astro"]
check-file = true

[type.markdown]
# Markdown-specific settings
extend-glob = ["*.md", "*.mdx"]
check-file = true

[type.json]
# JSON-specific settings
extend-glob = ["*.json", "*.jsonc"]
check-file = true

[type.yaml]
# YAML-specific settings
extend-glob = ["*.yaml", "*.yml"]
check-file = true

[type.toml]
# TOML-specific settings
extend-glob = ["*.toml"]
check-file = true

[type.rust]
# Rust-specific settings
extend-glob = ["*.rs"]
check-file = true

[type.python]
# Python-specific settings
extend-glob = ["*.py", "*.pyi"]
check-file = true

[type.go]
# Go-specific settings
extend-glob = ["*.go"]
check-file = true
