# === Headless + Encoder-Compatible RetroArch config ===

# Use EGL for headless GLES (works with virglrenderer or llvmpipe)
video_driver = "glcore"
glcore_force_gles = true

# Use X11 only if absolutely needed (commented out here)
#video_driver = "x11"

# VSync settings
video_vsync = false         # Avoid frame rate cap when encoding
video_threaded = false      # Use true only if tearing occurs

# Use PulseAudio for audio passthrough (Xvfb + encoder container support)
audio_enable = true
audio_driver = "pulse"

# Input driver (SDL2 is best for keyboard + gamepad virtual forwarding)
input_driver = "sdl2"
input_enable_hotkey = false

# Prevent pause when RetroArch window is unfocused or menu opens
pause_nonactive = false
pause_when_menu_activated = false

# Disable overlays and shaders (cleaner output and performance)
video_shader_enable = false
input_overlay_enable = false

# Don't persist changes to this override file
config_save_on_exit = false

# Disable file logging (output to stdout only)
log_to_file = false

# In-game menu
menu_driver = "rgui"
menu_enable = false         # Hide menu entirely (good for stream-only mode)

# Hide all on-screen font messages (e.g., save state, load state)
video_font_enable = false

video_frame_delay = 0       # Reduce latency
video_gpu_screenshot = false  # Use software screenshots if GPU is problematic

video_fullscreen = false
video_windowed_fullscreen = false
video_scale = 1.0

input_remap_enable = false  # Ensure default bindings are used
