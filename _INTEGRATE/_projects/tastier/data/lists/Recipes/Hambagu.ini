Hambagu

Ingredients (2–3 servings)

Patties
	•	250 g (9 oz) ground beef (80/20)
	•	150 g (5 oz) ground pork
	•	½ onion, finely minced
	•	1 egg
	•	½ cup panko breadcrumbs
	•	2–3 tbsp milk
	•	1 tsp salt
	•	½ tsp black pepper
	•	¼ tsp nutmeg (optional)
	•	1 tbsp neutral oil

Sauce (Demi-Glace + Onion Soy)
	•	½ onion, thinly sliced
	•	1 tbsp butter
	•	1 tbsp neutral oil
	•	2 tbsp red wine
	•	3 tbsp ketchup
	•	2 tbsp Worcestershire sauce
	•	1½ tbsp soy sauce
	•	1 tbsp mirin
	•	½ cup beef stock (or water + ½ tsp beef bouillon)
	•	Black pepper, to taste

⸻

Instructions
	1.	Prepare minced onion (for patties)
Sauté the minced onion in a little oil over medium heat until soft and lightly golden. Cool completely.
	2.	Mix patties
Combine panko and milk. Add beef, pork, cooked minced onion, egg, salt, pepper, and nutmeg. Mix gently until just combined.
	3.	Shape
Divide into 2–3 oval patties. Lightly toss between your hands to remove air. Press a shallow dent in the center.
	4.	Cook patties
Heat oil in a pan over medium. Sear patties 2–3 minutes per side until well browned. Add a splash of water, cover, and steam 5–6 minutes until cooked through. Remove and keep warm.
	5.	Build the sauce
In the same pan, add butter and oil. Sauté sliced onion over medium-low until deeply caramelized (6–8 minutes).
Deglaze with red wine; reduce by half.
Add ketchup, Worcestershire, soy sauce, mirin, and stock. Simmer 3–5 minutes until glossy and slightly thickened. Season with black pepper.
	6.	Finish & serve
Return patties to the pan, spoon sauce over, and simmer 1 minute to coat.

⸻

Common Sides
	•	Steamed rice
	•	Buttered corn or green beans
	•	Sunny-side-up egg

⸻

Key Tips
	•	Caramelizing the sliced onion is what elevates the sauce—do not rush it.
	•	This sauce should be savory-forward; adjust ketchup down if you prefer less sweetness.
	•	Rest patties briefly before returning to the sauce to retain juices.