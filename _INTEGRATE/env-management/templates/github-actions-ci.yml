# GitHub Actions CI with Infisical
#
# This workflow demonstrates how to use Infisical for secret management
# in CI/CD pipelines. Copy and customize for your project.

name: CI

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging]

# Environment variables available to all jobs
env:
  INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
  INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
  INFISICAL_SITE_URL: ${{ vars.INFISICAL_SITE_URL || 'https://app.infisical.com' }}

jobs:
  # Determine which environment to use based on branch
  setup:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          elif [[ "${{ github.head_ref }}" == feature/* ]] || [[ "${{ github.head_ref }}" == fix/* ]]; then
            echo "environment=feature" >> $GITHUB_OUTPUT
          else
            echo "environment=local" >> $GITHUB_OUTPUT
          fi

  build:
    runs-on: ubuntu-latest
    needs: setup
    env:
      INFISICAL_ENV: ${{ needs.setup.outputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
          sudo apt-get update && sudo apt-get install -y infisical

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: infisical run --env=${{ env.INFISICAL_ENV }} -- pnpm build

      - name: Type check
        run: infisical run --env=${{ env.INFISICAL_ENV }} -- pnpm type-check

      - name: Lint
        run: pnpm lint

  test:
    runs-on: ubuntu-latest
    needs: [setup, build]
    env:
      INFISICAL_ENV: ${{ needs.setup.outputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
          sudo apt-get update && sudo apt-get install -y infisical

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: infisical run --env=${{ env.INFISICAL_ENV }} -- pnpm test

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  # Optional: Deploy preview for PRs
  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [setup, build, test]
    env:
      INFISICAL_ENV: feature

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
          sudo apt-get update && sudo apt-get install -y infisical

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy preview
        run: infisical run --env=feature -- pnpm deploy:preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Preview deployed to: https://pr-${{ github.event.pull_request.number }}-preview.app'
            })
