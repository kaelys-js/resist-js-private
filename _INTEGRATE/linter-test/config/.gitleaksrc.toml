# Gitleaks configuration
# https://github.com/gitleaks/gitleaks

title = "Gitleaks Configuration"

[extend]
# Extend the default rules
useDefault = true

[allowlist]
# Global allowlist
description = "Global Allowlist"

# Regex patterns to ignore
regexes = [
    '''219-09-9999''',                    # Example SSN for testing
    '''078-05-1120''',                    # Another example SSN
    '''example\.com''',                   # Example domain
    '''test@example\.com''',              # Test email
    '''EXAMPLE_[A-Z_]+''',                # Example env vars
    '''placeholder''',                    # Placeholder text
    '''dummy''',                          # Dummy values
    '''changeme''',                       # Change-me values
    '''YOUR_[A-Z_]+_HERE''',              # Template placeholders
]

# Paths to ignore
paths = [
    '''node_modules''',
    '''\.git''',
    '''dist''',
    '''build''',
    '''\.svelte-kit''',
    '''coverage''',
    '''target''',
    '''vendor''',
    '''\.next''',
    '''\.nuxt''',
    '''\.output''',
    '''\.vercel''',
    '''__pycache__''',
    '''\.pytest_cache''',
    '''\.mypy_cache''',
    '''\.tox''',
    '''\.venv''',
    '''venv''',
    '''env''',
    '''\.env\.example''',
    '''\.env\.sample''',
    '''\.env\.template''',
    '''.*\.test\..*''',
    '''.*\.spec\..*''',
    '''.*_test\..*''',
    '''.*\.mock\..*''',
    '''testdata''',
    '''fixtures''',
    '''mocks''',
    '''__mocks__''',
    '''__tests__''',
]

# Commits to ignore (by SHA)
commits = []

# Stop words - strings that indicate a non-secret
stopwords = [
    "example",
    "sample",
    "test",
    "mock",
    "fake",
    "dummy",
    "placeholder",
    "changeme",
    "redacted",
    "xxx",
    "yyy",
    "zzz",
]

# Additional rules
[[rules]]
id = "custom-api-key"
description = "Custom API Key Pattern"
regex = '''(?i)custom[_-]?api[_-]?key['\"]?\s*[:=]\s*['\"]?([a-zA-Z0-9_\-]{32,})'''
tags = ["key", "api", "custom"]

[[rules]]
id = "internal-token"
description = "Internal Token Pattern"
regex = '''(?i)internal[_-]?token['\"]?\s*[:=]\s*['\"]?([a-zA-Z0-9_\-]{20,})'''
tags = ["token", "internal"]

[[rules.allowlist]]
regexes = [
    '''example''',
    '''test''',
    '''placeholder''',
]
