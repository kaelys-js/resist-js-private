# ls-lint configuration
# https://ls-lint.org/

ls:
  # Source directories
  src:
    # TypeScript/JavaScript files: kebab-case or PascalCase for components
    .ts: kebab-case
    .tsx: kebab-case | PascalCase
    .js: kebab-case
    .jsx: kebab-case | PascalCase
    .mjs: kebab-case
    .cjs: kebab-case
    .mts: kebab-case
    .cts: kebab-case

    # Svelte components: PascalCase
    .svelte: PascalCase

    # Vue components: PascalCase
    .vue: PascalCase

    # Astro components: PascalCase
    .astro: PascalCase

    # Styles: kebab-case
    .css: kebab-case
    .scss: kebab-case
    .sass: kebab-case
    .less: kebab-case

    # Tests: kebab-case with optional .test/.spec suffix
    .test.ts: kebab-case
    .test.tsx: kebab-case
    .spec.ts: kebab-case
    .spec.tsx: kebab-case

    # Directories: kebab-case or special folders
    .dir: kebab-case | regex:^(__tests__|__mocks__|__fixtures__)$

  # Library directories
  lib:
    .ts: kebab-case
    .js: kebab-case
    .dir: kebab-case

  # Scripts
  scripts:
    .ts: kebab-case
    .js: kebab-case
    .mjs: kebab-case
    .sh: kebab-case
    .dir: kebab-case

  # Config files (root level)
  config:
    .ts: kebab-case
    .js: kebab-case
    .json: kebab-case | regex:^(tsconfig|package|biome|turbo).*$
    .yaml: kebab-case
    .yml: kebab-case
    .toml: kebab-case

  # Components directory (if separate)
  components:
    .svelte: PascalCase
    .vue: PascalCase
    .tsx: PascalCase
    .jsx: PascalCase
    .dir: PascalCase | kebab-case

  # Routes (SvelteKit style)
  routes:
    .svelte: regex:^\+.*$|PascalCase
    .ts: regex:^\+.*$|kebab-case
    .js: regex:^\+.*$|kebab-case
    .dir: kebab-case | regex:^\[.*\]$|regex:^\(.*\)$

  # API routes
  api:
    .ts: kebab-case
    .js: kebab-case
    .dir: kebab-case | regex:^\[.*\]$

  # Shared packages
  shared:
    .ts: kebab-case
    .js: kebab-case
    .dir: kebab-case

  # Products
  products:
    .dir: kebab-case

ignore:
  - node_modules
  - dist
  - build
  - .svelte-kit
  - .next
  - .nuxt
  - .output
  - coverage
  - target
  - vendor
  - .git
  - .turbo
  - .vercel
  - __pycache__
  - "*.d.ts"
  - "*.min.js"
  - "*.min.css"
  - "*.bundle.js"
  - "*.generated.ts"
