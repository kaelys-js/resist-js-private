# yaml-language-server: $schema=https://gitlab.com/gitlab-org/gitlab/-/raw/master/app/assets/javascripts/editor/schema/ci.json

# ------------------------------------------------------------------------------
# 📝 Comment Preview URL to Merge Request
# ------------------------------------------------------------------------------
# comment-preview-url — Automatically posts the deployed preview URL as a comment on the GitLab Merge Request.
#
# ✅ What it does:
#    - Extracts PREVIEW_URL from `.env.preview` (generated by preview:deploy)
#    - Resolves the merge request IID dynamically if not already provided
#    - Posts a Markdown-formatted comment to the MR via GitLab API
#
# ✅ Usage Context:
#    - Runs only on feature branches (`/^feature\/.+$/`)
#    - Depends on preview:deploy to ensure the preview URL exists
#    - Avoids duplicate posts by checking for CI_MERGE_REQUEST_IID or resolving via source_branch lookup
#
# ✅ Output Example:
#    "🔍 Preview for `feature/my-branch`: 👉 https://my-preview-url.workers.dev"
#
# This job provides immediate MR visibility into preview environments and simplifies reviewer workflows.
comment-preview-url:
  stage: deploy
  needs: [preview:deploy]
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^feature\/.+$/'
  script:
    - comment_preview_url_to_mr | tee .comment-preview-url-report.md
  artifacts:
    paths:
      - .comment-preview-url-report.md
    expire_in: 7 days

# ------------------------------------------------------------------------------
# 📋 Generate and Post CI Validation Report
# ------------------------------------------------------------------------------
# generate:validation-report — Aggregates all validation, lint, test, and deploy artifacts
# into a single Markdown report and posts a summary to the Merge Request.
#
# ✅ What it does:
#    - Collects: .test-summary.md, .lint-summary.md, .migrate-*.md, .validate-*.md, etc.
#    - Generates: unified `.validation-report.md`
#    - Posts: a clean summary comment to the MR via GitLab API
#
# ✅ Benefits:
#    - Creates a one-stop audit trail for CI checks
#    - Improves visibility and review speed on MRs
#    - Enables centralized infra, app, and logic verification
generate:validation-report:
  stage: test
  needs:
    - test
    - lint
    - migrate:check
    - migrate:apply
    - validate:storage
    - validate:r2
    - validate:kv
    - validate:d1
    - validate:tail-worker
    - deploy
  script:
    - |
      echo "# ✅ CI Validation Report" > .validation-report.md
      echo "- **Branch:** \`$CI_COMMIT_REF_NAME\`" >> .validation-report.md
      echo "- **Commit:** \`$CI_COMMIT_SHORT_SHA\`" >> .validation-report.md
      echo "- **Environment:** \`$WRANGLER_ENV\`" >> .validation-report.md
      echo "- **Generated:** \`$(date -u +"%Y-%m-%dT%H:%M:%SZ")\`" >> .validation-report.md
      echo "" >> .validation-report.md

      echo "## 🧪 Lint & Test Results" >> .validation-report.md
      cat .lint-summary.md       >> .validation-report.md || echo "_Lint summary not available_" >> .validation-report.md
      cat .test-summary.md       >> .validation-report.md || echo "_Test summary not available_" >> .validation-report.md
      echo "" >> .validation-report.md

      echo "## 🧱 Migration" >> .validation-report.md
      cat .migrate-check-summary.md >> .validation-report.md || true
      cat .migrate-apply-summary.md >> .validation-report.md || true
      echo "" >> .validation-report.md

      echo "## ☁️ Infra Validation" >> .validation-report.md
      cat .validate-storage-bindings-summary.md >> .validation-report.md || true
      cat .validate-r2-summary.md               >> .validation-report.md || true
      cat .validate-kv-namespaces-summary.md    >> .validation-report.md || true
      cat .validate-d1-summary.md               >> .validation-report.md || true
      cat .validate-tail-worker-summary.md      >> .validation-report.md || true
      echo "" >> .validation-report.md

      echo "## 🚀 Deployment Results" >> .validation-report.md
      cat .deploy-staging-summary.md            >> .validation-report.md || true
      cat .canary-summary.md                    >> .validation-report.md || true
      echo "" >> .validation-report.md

      echo "## 📝 Artifacts" >> .validation-report.md
      ls -la *.md >> .validation-report.md

    - |
      if [ -n "${CI_MERGE_REQUEST_IID:-}" ]; then
        echo "📡 Posting validation summary to MR #$CI_MERGE_REQUEST_IID..."

        SUMMARY=$(awk '
          BEGIN { keep=0; }
          /^## / { keep=0; }
          /^## 🧪 Lint & Test Results/ { keep=1; next; }
          keep { print; }
        ' .validation-report.md | head -n 20)

        curl --silent --fail -X POST \
          -H "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
          -H "Content-Type: application/json" \
          "$CI_API_V4_URL/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID/notes" \
          -d @- <<EOF
{ "body": "🧪 **CI Validation Summary** for \`$CI_COMMIT_REF_NAME\`\n\n\`\`\`\n${SUMMARY}\n...\n\`\`\`\n\nFull report: saved as CI artifact (.validation-report.md)" }
EOF
      fi
  artifacts:
    paths:
      - .validation-report.md
    expire_in: 7 days