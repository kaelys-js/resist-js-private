# yaml-language-server: $schema=https://gitlab.com/gitlab-org/gitlab/-/raw/master/app/assets/javascripts/editor/schema/ci.json

# ------------------------------------------------------------------------------
# 🔐 Secret Synchronization
# ------------------------------------------------------------------------------
# This job runs only for deployable environments (staging, main/master).
# It ensures secrets like SENTRY_DSN and SENTRY_PROJECT are available
# to the deployed Worker via `wrangler secret put`.
#
# ✅ Secrets are sourced from GitLab CI/CD variables
# ✅ Secrets are written into Wrangler's environment-specific secret store
# ✅ Skips feature branches (e.g. preview environments) to prevent leakage
# ✅ Centralized in ./src/scripts/sync-secrets.sh for auditability and reuse

# sync:secrets — Syncs required CI/CD secrets into Cloudflare via Wrangler.
sync:secrets:
  stage: setup
  # 🔐 Sync secrets for the target WRANGLER_ENV (staging/prod only)
  # Uses ./src/scripts/sync-secrets.sh to inject CI/CD secrets (e.g. SENTRY_DSN)
  # Skips on feature branches to avoid leaking secrets into preview environments
  script:
    - sync-secrets | tee .sync-secrets-summary.md
  rules:
    - if: '$CI_COMMIT_BRANCH == "staging" || $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
  artifacts:
    paths:
      - .sync-secrets-summary.md
    when: always
    expire_in: 3 days