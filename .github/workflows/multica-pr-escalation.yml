name: Multica PR escalation

# When the CI workflow fails on a PR labeled `multica`, count the failures
# via PR comments. After 3 consecutive failures, remove `multica` label,
# add `needs-human-review`, and @-mention the user for attention.
#
# Uses workflow_run (not check_run) because check_run doesn't reliably fire
# for Actions-created checks.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  escalate:
    # No top-level if: — the job ALWAYS runs so the workflow conclusion is
    # "success" (not the misleading "failure" GitHub reports when all jobs
    # are filtered out by if:). Step-level if: gates the actual escalation.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Report parent CI conclusion
        run: |
          echo "Parent CI conclusion: ${{ github.event.workflow_run.conclusion }}"
          echo "Parent CI head_branch: ${{ github.event.workflow_run.head_branch }}"
          echo "Parent CI head_sha:    ${{ github.event.workflow_run.head_sha }}"

      - name: Find associated multica PRs and escalate
        if: ${{ github.event.workflow_run.conclusion == 'failure' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          set -euo pipefail

          # Find PRs for this commit, filter to those labeled `multica`
          PRS=$(gh api "repos/$REPO/commits/$SHA/pulls" \
            --jq '.[] | select(.labels | map(.name) | contains(["multica"])) | .number')

          if [ -z "$PRS" ]; then
            echo "No multica-labeled PRs for $SHA"
            exit 0
          fi

          for PR in $PRS; do
            COUNT=$(gh api "repos/$REPO/issues/$PR/comments" \
              --jq '[.[] | select(.body | startswith("<!-- multica-failure-count -->"))] | length')
            NEW_COUNT=$((COUNT + 1))

            gh pr comment "$PR" --repo "$REPO" --body "<!-- multica-failure-count -->
          CI failure #${NEW_COUNT} on this PR. [View run]($RUN_URL)"

            if [ "$NEW_COUNT" -ge 3 ]; then
              gh pr edit "$PR" --repo "$REPO" --remove-label multica --add-label needs-human-review || true
              gh pr comment "$PR" --repo "$REPO" --body \
                "@cole — agent has failed CI ${NEW_COUNT}× on this PR. Auto-merge label removed; needs human review."
            fi
          done
