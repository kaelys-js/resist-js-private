name: Multica auto-PR

# When the multica-handoff skill pushes a multica/<issue-id> branch, open a
# PR against main, label it `multica`, and enable auto-merge so it lands as
# soon as the CI workflow goes green.

on:
  push:
    branches:
      - 'multica/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  open-pr:
    name: open PR + enable auto-merge
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Open PR + enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ISSUE_ID="${BRANCH#multica/}"
          TITLE=$(git log -1 --format=%s)
          BODY=$(cat <<EOF
          Multica issue: \`${ISSUE_ID}\`

          Auto-PR opened by \`multica-auto-pr\` workflow on push to \`${BRANCH}\`.
          Will auto-merge when CI passes (squash strategy, branch deleted on merge).

          View in Multica: http://localhost:3000/resist-js/issues/${ISSUE_ID}

          🤖 Generated by Multica
          EOF
          )

          # Skip if a PR already exists for this branch (e.g. agent re-pushed)
          if gh pr view "$BRANCH" --json number --jq '.number' >/dev/null 2>&1; then
            echo "PR already exists for $BRANCH — skipping create"
            exit 0
          fi

          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$TITLE" \
            --body "$BODY" \
            --label multica)

          echo "PR opened: $PR_URL"

          # Enable auto-merge with squash strategy. Will succeed only if the
          # repo has "Allow auto-merge" enabled AND main has branch protection
          # requiring at least one status check (otherwise the API rejects).
          gh pr merge --auto --squash "$PR_URL" || {
            gh pr comment "$PR_URL" --body \
              "Could not enable auto-merge. Repo settings or branch protection may need adjustment. Merge manually after CI is green."
          }
