name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: qa
    runs-on: macos-14   # arm64, matches Apple Silicon dev environment
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        # Reads version from package.json packageManager field (pnpm@10.30.2)

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'   # reads engines.node (>=25 → latest 25.x)
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (strict — zero diagnostics required)
        run: pnpm -w run qa:lint

      - name: Tests
        run: pnpm -w run qa:test

      - name: Typecheck
        run: pnpm -w run qa:typecheck
