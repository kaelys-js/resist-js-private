name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Reusable setup is duplicated across jobs intentionally — GitHub Actions has
# no first-class composite action sharing for repo-local steps that's worth
# the indirection. Three blocks of ~10 lines each is fine.

jobs:
  format:
    name: format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: Restore biome / prettier caches
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.cache
          key: format-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'biome.json', '.prettierrc*') }}-${{ github.sha }}
          restore-keys: |
            format-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'biome.json', '.prettierrc*') }}-
            format-${{ runner.os }}-

      - name: Install dependencies
